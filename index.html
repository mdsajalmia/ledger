function apkHelpModal(){
  openModal(`<div class="modal">
    <div class="modal-head"><h3>Get a real .apk</h3><button class="icon-btn" data-action="close-modal">${I('x')}</button></div>
    <div class="modal-body" style="font-size:13.5px;line-height:1.65;color:var(--text-soft);">
      <p>Ledger already ships with what an Android packaging tool needs (manifest, icons, offline support) — it just needs to live at a real web address first, since packaging tools can't read a file straight off your computer.</p>
      <p><strong>1. Host it (free, ~1 minute, no signup):</strong> go to <span style="font-family:var(--font-mono);">netlify.com/drop</span> and drag in the whole Ledger folder (index.html, manifest.json, sw.js, icons/). You get a live https address instantly.</p>
      <p><strong>2. Build the .apk (free, ~5 minutes):</strong> go to <span style="font-family:var(--font-mono);">pwabuilder.com</span>, paste that address, click <em>Start</em>. Once scanned, click <em>Package for Stores → Android</em>, then download.</p>
      <p><strong>3. Install it:</strong> you get a real, signed <span style="font-family:var(--font-mono);">.apk</span>. Send it to your phone and open it (Android asks to allow installs from that source once) — or use the <span style="font-family:var(--font-mono);">.aab</span> version to publish to the Play Store.</p>
      <p style="margin-top:10px;">Already set up Firebase for household sync? You can use <strong>Firebase Hosting</strong> instead of Netlify for step 1 — same free project, one command (<span style="font-family:var(--font-mono);">firebase deploy</span>) if you're comfortable with a terminal.</p>
    </div>
    <div class="modal-foot"><button class="btn btn-primary" data-action="close-modal">Got it</button></div>
  </div>`);
}

async function handleAction(action, target){
  const id = target.dataset.id;
  switch(action){
    case 'open-menu': menuModal(); break;
    case 'menu-goto': ui.view = target.dataset.target; closeModal(); renderAll(); break;
    case 'month-prev': ui.month = shiftMonth(ui.month, -1); renderAll(); break;
    case 'month-next': ui.month = shiftMonth(ui.month, 1); renderAll(); break;
    case 'period-prev': shiftPeriod(-1); renderAll(); break;
    case 'period-next': shiftPeriod(1); renderAll(); break;
    case 'open-add-tx': txModal(null); break;
    case 'edit-tx': { const t = state.transactions.find(x=>x.id===id); if(t) txModal(t); break; }
    case 'delete-tx': {
      try{ await txRemove(id); closeModal(); renderAll(); toast('Transaction deleted'); }
      catch(e){ toast('Could not delete — check your connection'); }
      break;
    }
    case 'save-tx': {
      const amount = parseFloat(document.getElementById('fAmount').value);
      if(!amount || amount<=0){ toast('Enter a valid amount'); return; }
      const type = document.querySelector('#typeSeg button.active').dataset.type;
      const date = document.getElementById('fDate').value;
      const note = document.getElementById('fNote').value.trim();
      const recurringEl = document.getElementById('fRecurring');
      const recurring = recurringEl ? recurringEl.checked : false;
      let payload = {type, amount, date, note, recurring};
      if(type==='income' || type==='expense'){
        payload.category = document.getElementById('fCategory').value;
        const subEl = document.getElementById('fSubcategory');
        payload.subcategory = subEl ? subEl.value : '';
        if(type==='expense'){
          const natureBtn = document.querySelector('#natureSeg button.active');
          payload.nature = natureBtn ? natureBtn.dataset.nature : '';
        }
        payload.accountId = document.getElementById('fAccount').value;
      } else if(type==='transfer'){
        const from = document.getElementById('fFrom').value;
        const to = document.getElementById('fTo').value;
        if(from===to){ toast('Pick two different wallets'); return; }
        payload.fromAccountId = from; payload.toAccountId = to;
      } else if(type==='saving'){
        if(!state.goals.length){ toast('Create a goal first'); return; }
        payload.goalId = document.getElementById('fGoal').value;
        payload.accountId = document.getElementById('fAccount').value;
        payload.direction = document.querySelector('#dirSeg button.active')?.dataset.dir || 'in';
      }
      try{
        await txUpsert(payload, id||null);
        const saveTplEl = document.getElementById('fSaveTemplate');
        if(saveTplEl && saveTplEl.checked){
          const tplName = payload.category + (payload.note ? ' — '+payload.note : '');
          await templateUpsert({name: tplName.slice(0,40), type, category: payload.category, subcategory: payload.subcategory||'', amount, accountId: payload.accountId, nature: payload.nature||''}, null);
        }
        closeModal();
        ui.month = date.slice(0,7);
        renderAll(); toast('Transaction saved');
      }catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'apply-template': {
      const tpl = state.txTemplates.find(x=>x.id===id);
      if(tpl){
        txModal(null, {type:tpl.type, category:tpl.category, subcategory:tpl.subcategory||'', amount:tpl.amount, accountId:tpl.accountId, nature:tpl.nature||''});
      }
      break;
    }
    case 'delete-template': {
      const draft = readTxDraft({type: document.querySelector('#typeSeg button.active')?.dataset.type || 'expense'});
      try{ await templateRemove(id); }catch(e){}
      txModal(null, draft);
      break;
    }
    case 'delete-template-settings': {
      try{ await templateRemove(id); renderAll(); toast('Template removed'); }
      catch(e){ toast('Could not remove — check your connection'); }
      break;
    }
    case 'set-budget': budgetModal(target.dataset.cat); break;
    case 'save-budget': {
      const val = parseFloat(document.getElementById('fBudget').value)||0;
      try{ await budgetSet(target.dataset.cat, val); closeModal(); renderAll(); toast('Budget updated'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'open-add-goal': goalModal(null); break;
    case 'edit-goal': { const g = state.goals.find(x=>x.id===id); if(g) goalModal(g); break; }
    case 'delete-goal': {
      const inUse = state.transactions.some(t=>t.type==='saving' && t.goalId===id);
      if(inUse){ toast("Remove this goal's transactions first"); return; }
      try{ await goalRemove(id); renderAll(); toast('Goal removed'); }
      catch(e){ toast('Could not remove — check your connection'); }
      break;
    }
    case 'save-goal': {
      const name = document.getElementById('gName').value.trim();
      if(!name){ toast('Give the goal a name'); return; }
      const payload = {
        name,
        target: parseFloat(document.getElementById('gTarget').value)||0,
        startingSaved: parseFloat(document.getElementById('gStarting').value)||0,
        deadline: document.getElementById('gDeadline').value,
      };
      try{ await goalUpsert(payload, id||null); closeModal(); renderAll(); toast('Goal saved'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'goal-add-funds': txModal(null, {type:'saving', goalId:id, direction:'in'}); break;
    case 'open-add-investment': investmentModal(null); break;
    case 'edit-investment': { const inv = state.investments.find(x=>x.id===id); if(inv) investmentModal(inv); break; }
    case 'delete-investment': {
      try{ await investmentRemove(id); closeModal(); renderAll(); toast('Investment removed'); }

    }
    case 'save-investment': {

        currency: document.getElementById('invCurrency').value,
        notes: document.getElementById('invNotes').value.trim(),
        valueLog: (id && state.investments.find(x=>x.id===id)?.valueLog) || [],
      };
      try{ await investmentUpsert(payload, id||null); closeModal(); renderAll(); toast('Investment saved'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'investment-update-value': { const inv = state.investments.find(x=>x.id===id); if(inv) investmentValueModal(inv); break; }
    case 'confirm-investment-value': {
      const date = document.getElementById('ivDate').value;
      const value = parseFloat(document.getElementById('ivValue').value);
      if(!date || isNaN(value) || value<0){ toast('Enter a valid date and value'); return; }
      try{ await investmentAddValueLog(id, date, value); closeModal(); renderAll(); toast('Value updated'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'sell-investment': { const inv = state.investments.find(x=>x.id===id); if(inv) investmentSellModal(inv); break; }
    case 'open-add-planned-payment': plannedPaymentModal(null); break;
    case 'edit-planned-payment': { const p = state.plannedPayments.find(x=>x.id===id); if(p) plannedPaymentModal(p); break; }
    case 'delete-planned-payment': {
      try{ await plannedPaymentRemove(id); closeModal(); renderAll(); toast('Removed'); }
      catch(e){ toast('Could not remove — check your connection'); }
      break;
    }
    case 'save-planned-payment': {
      const name = document.getElementById('ppName').value.trim();
      if(!name){ toast('Give it a name'); return; }
      const payload = {
        name,
        amount: parseFloat(document.getElementById('ppAmount').value)||0,

        category: document.getElementById('ppCategory').value,

    }
    case 'mark-payment-paid': { const p = state.plannedPayments.find(x=>x.id===id); if(p) markPaymentPaidModal(p); break; }
    case 'confirm-payment-paid': {
      const paidDate = document.getElementById('ppPaidDate').value;
      const accountId = document.getElementById('ppPaidAccount').value;
      try{ await plannedPaymentMarkPaid(id, paidDate, accountId); closeModal(); renderAll(); toast('Marked paid'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'open-add-debt': debtModal(null); break;
    case 'edit-debt': { const d = state.debts.find(x=>x.id===id); if(d) debtModal(d); break; }
    case 'delete-debt': {
      try{ await debtRemove(id); closeModal(); renderAll(); toast('Removed'); }
      catch(e){ toast('Could not remove — check your connection'); }
      break;
    }
    case 'save-debt': {
      const person = document.getElementById('debtPerson').value.trim();
      if(!person){ toast('Enter a name'); return; }
      const typeBtn = document.querySelector('#debtTypeSeg button.active');
      const payload = {
        type: typeBtn ? typeBtn.dataset.dtype : 'borrowed',
        person,
        amount: parseFloat(document.getElementById('debtAmount').value)||0,
        date: document.getElementById('debtDate').value,
        dueDate: document.getElementById('debtDue').value,
        showInTotal: document.getElementById('debtShowInTotal').checked,
        notes: document.getElementById('debtNotes').value.trim(),
        status: 'active',
      };
      try{ await debtUpsert(payload, id||null); closeModal(); renderAll(); toast('Saved'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'close-debt': { const d = state.debts.find(x=>x.id===id); if(d) debtCloseModal(d); break; }
    case 'confirm-close-debt': {
      const closeDate = document.getElementById('debtCloseDate').value;
      const toAccountId = document.getElementById('debtCloseAccount').value;
      try{ await debtClose(id, closeDate, toAccountId); closeModal(); renderAll(); toast('Settled'); }
      catch(e){ toast('Could not save — check your connection'); }
      break;
    }
    case 'confirm-investment-sell': {
      const sellDate = document.getElementById('sellDate').value;
      const sellValue = parseFloat(document.getElementById('sellValue').value);
      const toAccountId = document.getElementById('sellAccount').value;
      if(!sellDate || isNaN(sellValue) || sellValue<0){ toast('Enter a valid date and value'); return; }
      try{ await investmentSell(id, sellDate, sellValue, toAccountId); closeModal(); renderAll(); toast('Investment sold'); }

    }
    case 'goal-withdraw-funds': txModal(null, {type:'saving', goalId:id, direction:'out'}); break;
    case 'open-add-account': accountModal(null); break;
    case 'edit-account': { const a = state.accounts.find(x=>x.id===id); if(a) accountModal(a); break; }
    case 'save-account': {

      if(!name){ toast('Name the wallet'); return; }
      const initial = parseFloat(document.getElementById('aInitial').value)||0;

    case 'toggle-dark-mode': await toggleDarkMode(); break;
    case 'save-currency-rates': {

      catch(e){ toast('Could not save — check your connection'); }

    case 'disable-daily-reminder': await disableDailyReminder(); break;
    case 'connect-drive': {

    }
    case 'disconnect-drive': disconnectDrive(); break;

      if(!driveAccessToken){
        const envIssue = checkOAuthEnvironment();
        if(envIssue){ toast(envIssue); return; }

        if(initGis()) gisTokenClient.requestAccessToken({prompt:'consent'});
      }else{
        await doDriveBackup(false);
        renderAll();
      }
      break;
    }
    case 'drive-restore': driveRestoreRequest(); break;
    case 'show-snapshots': snapshotsModal(); break;
    case 'restore-snapshot': await restoreFromSnapshot(target.dataset.fileid); break;
    case 'show-drive-help': driveHelpModal(); break;
    case 'save-firebase-config': {
      const raw = document.getElementById('fbConfigInput').value.trim();
      if(!raw){ toast('Paste your Firebase config first'); return; }
      let cfg;
      try{
        let clean = raw.replace(/^[^{]*/, '').replace(/;\s*$/, '');
        cfg = (new Function('return (' + clean + ')'))();
      }catch(e){ toast('Could not read that config — check the format'); return; }
      const ok = await initFirebase(cfg);
      if(ok){
        state.firebaseConfig = cfg;
        await persist();
        renderAll();
        toast('Connected to Firebase');
      }
      break;
    }
    case 'create-household': {
      if(!firebaseReady){ toast('Connect Firebase first'); return; }
      await createHousehold();
      break;
    }
    case 'join-household': {
      if(!firebaseReady){ toast('Connect Firebase first'); return; }
      const code = document.getElementById('joinCodeInput').value.trim();
      if(!code){ toast('Enter a household code'); return; }
      if(!confirm("Joining replaces this device's current data with the household's shared data. Continue?")) return;
      await joinHousehold(code);
      renderAll();
      break;
    }
    case 'leave-household': {
      if(confirm('Leave this household? Your data stays as-is on this device, but stops syncing.')){
        stopHouseholdListeners();
        state.householdId = null;
        await persist(); renderAll(); toast('Left household');
      }
      break;
    }
    case 'copy-household-code': {
      if(navigator.clipboard){ navigator.clipboard.writeText(state.householdId||'').then(()=>toast('Code copied')); }
      break;
    }
    case 'show-household-help': householdHelpModal(); break;
    case 'show-apk-help': apkHelpModal(); break;
    case 'choose-local-folder': await chooseLocalFolder(); break;
    case 'disconnect-local-folder': await disconnectLocalFolder(); break;
    case 'reset-data': {
      if(confirm('This will permanently delete all your data. Continue?')){
        state = defaultState();
        await persist(); renderAll(); toast('All data cleared');
      }
      break;
    }
    case 'close-modal': closeModal(); break;
  }
}

function summaryForDays(days){
  const end = todayStr();
  const start = days===null ? '0001-01-01' : addDays(end, -(days-1));
  const txs = state.transactions.filter(t=>t.date>=start && t.date<=end);
  let income=0, expense=0, savings=0;
  txs.forEach(t=>{
    if(t.type==='income') income+=t.amount;
    else if(t.type==='expense') expense+=t.amount;
    else if(t.type==='saving') savings += (t.direction==='out'?-t.amount:t.amount);
  });
  return {income, expense, net:income-expense, savings};
}
function categorySpendForDays(days){
  const end = todayStr();
  const start = days===null ? '0001-01-01' : addDays(end, -(days-1));
  const map = {};
  state.transactions.filter(t=>t.type==='expense' && t.date>=start && t.date<=end).forEach(t=>{
    map[t.category] = (map[t.category]||0) + t.amount;
  });
  return map;
}

function printMonthReport(){
  const periods = [
    {label:'Last 7 days', days:7},
    {label:'Last 15 days', days:15},
    {label:'Last 30 days', days:30},
    {label:'Last 60 days', days:60},
    {label:'Last 1 year', days:365},
    {label:'All time', days:null},
  ];
  const periodRows = periods.map(p=>{
    const s = summaryForDays(p.days);
    return `<tr><td>${p.label}</td><td class="amt-in">${fmt(s.income)}</td><td class="amt-out">${fmt(s.expense)}</td><td>${fmt(s.savings)}</td><td class="${s.net>=0?'amt-in':'amt-out'}">${fmt(s.net)}</td></tr>`;
  }).join('');

  const walletRows = state.accounts.map(a=>`<tr><td>${esc(a.name)}</td><td>${ACCOUNT_GROUPS[a.group||'other'].label}</td><td>${fmt(accountBalance(a.id))}</td><td>${a.showInTotal===false?'No':'Yes'}</td></tr>`).join('');

  const allTimeCats = Object.entries(categorySpendForDays(null)).sort((a,b)=>b[1]-a[1]);
  const catRows = allTimeCats.map(([c,v])=>`<tr><td>${esc(c)}</td><td>${fmt(v)}</td></tr>`).join('');

  const activeInv = state.investments.filter(i=>!i.soldDate);
  const closedInv = state.investments.filter(i=>i.soldDate);
  const invTotalInvested = activeInv.reduce((s,i)=>s+convertToBase(i.investedAmount||0,i.currency),0);
  const invTotalCurrent = activeInv.reduce((s,i)=>s+convertToBase(investmentCurrentValue(i),i.currency),0);
  const invRows = activeInv.map(inv=>{
    const cur = investmentCurrentValue(inv);
    const ipl = cur-inv.investedAmount;
    return `<tr><td>${esc(inv.name)}</td><td>${esc(inv.category)}</td><td>${fmtCur(inv.investedAmount,inv.currency)}</td><td>${fmtCur(cur,inv.currency)}</td><td class="${ipl>=0?'amt-in':'amt-out'}">${ipl>=0?'+':''}${fmtCur(ipl,inv.currency)}</td></tr>`;
  }).join('');

  const goalRows = state.goals.map(g=>{
    const saved = goalSavedTotal(g.id);
    return `<tr><td>${esc(g.name)}</td><td>${fmt(saved)}</td><td>${fmt(g.target)}</td><td>${g.target>0?Math.round(saved/g.target*100):0}%</td></tr>`;
  }).join('');

  const activeDebts = state.debts.filter(d=>d.status!=='closed');
  const debtRows = activeDebts.map(d=>`<tr><td>${d.type==='borrowed'?'Borrowed':'Lent'}</td><td>${esc(d.person)}</td><td>${fmt(d.amount)}</td><td>${d.date}</td><td>${d.dueDate||'—'}</td></tr>`).join('');

  const upcoming = upcomingPlannedPayments(60);
  const paymentRows = upcoming.map(p=>`<tr><td>${esc(p.name)}</td><td>${fmt(p.amount)}</td><td>${p.dueDate}</td></tr>`).join('');

  document.getElementById('printArea').innerHTML = `

function exportCSV(){
  const rows = [['Date','Type','Category/Goal','Subcategory','Nature','Wallet/From','To Wallet','Amount','Direction','Note','Recurring']];
  state.transactions.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    if(t.type==='transfer'){
      const from = state.accounts.find(a=>a.id===t.fromAccountId);
      const to = state.accounts.find(a=>a.id===t.toAccountId);
      rows.push([t.date,'transfer','','','', from?from.name:'', to?to.name:'', t.amount, '', (t.note||'').replace(/,/g,';'), t.recurring?'yes':'no']);
    } else if(t.type==='saving'){
      const g = state.goals.find(x=>x.id===t.goalId);
      const acc = state.accounts.find(a=>a.id===t.accountId);
      rows.push([t.date,'saving', g?g.name:'','','', acc?acc.name:'', '', t.amount, t.direction||'in', (t.note||'').replace(/,/g,';'), t.recurring?'yes':'no']);
    } else {
      const acc = state.accounts.find(a=>a.id===t.accountId);
      rows.push([t.date, t.type, t.category, t.subcategory||'', t.nature||'', acc?acc.name:'', '', t.amount, '', (t.note||'').replace(/,/g,';'), t.recurring?'yes':'no']);
    }
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  downloadBlob(csv, 'ledger-transactions.csv', 'text/csv');
}
function exportJSON(){

function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ============ BACKUP: GOOGLE DRIVE ============ */
let gisTokenClient = null;
let driveAccessToken = null;

let pendingDriveIntent = 'backup'; // 'backup' | 'restore' | 'connect'

function initGis(){
  if(!window.google || !window.google.accounts || !state.driveClientId) return false;
  gisTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.driveClientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: async (resp)=>{
      if(resp && resp.access_token){
        driveAccessToken = resp.access_token;
        if(pendingDriveIntent === 'restore'){
          await driveRestoreLatest();
        } else if(pendingDriveIntent === 'connect'){
          await handleFirstDriveConnect();
        } else {
          await doDriveBackup(false);
        }
        renderAll();
      }else{
        const reason = resp && (resp.error_description || resp.error) ? (resp.error_description || resp.error) : 'unknown reason';
        toast('Google sign-in failed: ' + reason);
        console.error('Drive sign-in error', resp);
      }
    },
    error_callback: (err)=>{
      toast('Google sign-in error: ' + (err && (err.message || err.type) || 'could not open sign-in'));
      console.error('Drive sign-in error_callback', err);
    }
  });
  return true;
}

async function findBackupFileId(folderId){
  if(!folderId) return null;
  try{
    const q = encodeURIComponent(`name='ledger-latest-backup.json' and '${folderId}' in parents and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=modifiedTime desc&fields=files(id,name,modifiedTime)`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(res.ok){
      const data = await res.json();
      if(data.files && data.files.length) return data.files[0].id;
    }
  }catch(e){ /* ignore, caller falls back */ }
  return null;
}

/* ---- Backup snapshots / restore points (keeps last 10 dated copies, distinct from the always-current "latest" file) ---- */
const MAX_SNAPSHOTS = 10;
async function doDriveSnapshot(){
  if(!driveAccessToken) return;
  const today = todayStr();
  if(state.lastSnapshotDate === today) return; // already snapshotted today
  try{
    const folderId = await ensureDriveFolder();
    if(!folderId) return;
    const name = 'ledger-snapshot-'+today+'.json';
    const q = encodeURIComponent(`name='${name}' and '${folderId}' in parents and trashed=false`);
    const findRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    let existingId = null;
    if(findRes.ok){ const d = await findRes.json(); if(d.files && d.files.length) existingId = d.files[0].id; }
    const boundary = 'ledgerSnap'+Date.now();
    const metadata = {name, mimeType:'application/json'};
    if(!existingId) metadata.parents = [folderId];
    const payload = JSON.stringify(state);
    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
    const url = existingId ? `https://www.googleapis.com/upload/drive/v3/files/${existingId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method = existingId ? 'PATCH' : 'POST';
    await fetch(url, {method, headers:{'Authorization':'Bearer '+driveAccessToken, 'Content-Type':'multipart/related; boundary='+boundary}, body});
    state.lastSnapshotDate = today;
    await persist();
    await pruneOldSnapshots(folderId);
  }catch(e){ console.error('snapshot failed', e); }
}
async function pruneOldSnapshots(folderId){
  try{
    const q = encodeURIComponent(`name contains 'ledger-snapshot-' and '${folderId}' in parents and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=name desc&fields=files(id,name)`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(!res.ok) return;
    const data = await res.json();
    const files = data.files || [];
    const toDelete = files.slice(MAX_SNAPSHOTS);
    for(const f of toDelete){
      await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {method:'DELETE', headers:{'Authorization':'Bearer '+driveAccessToken}});
    }
  }catch(e){ /* non-fatal */ }
}
async function listSnapshots(){
  if(!driveAccessToken) return [];
  try{
    const folderId = await ensureDriveFolder();
    if(!folderId) return [];
    const q = encodeURIComponent(`name contains 'ledger-snapshot-' and '${folderId}' in parents and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=name desc&fields=files(id,name,modifiedTime)`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(!res.ok) return [];
    const data = await res.json();
    return data.files || [];
  }catch(e){ return []; }
}
async function restoreFromSnapshot(fileId){
  if(!confirm('This replaces everything on this device with this snapshot. Continue?')) return;
  try{
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(!res.ok){ toast('Could not fetch that snapshot (error '+res.status+')'); return; }
    const data = await res.json();
    if(!data.transactions){ toast('That snapshot looks invalid'); return; }
    const keep = {driveClientId:state.driveClientId, driveFileId:state.driveFileId, driveFolderId:state.driveFolderId, driveEnabled:state.driveEnabled};
    state = Object.assign(data, keep);
    migrateState();
    await persist(); closeModal(); renderAll(); toast('Restored from snapshot');
  }catch(e){ toast('Restore failed — check your connection'); }
}
function snapshotsModal(){
  openModal(`<div class="modal">

async function handleFirstDriveConnect(){
  const folderId = await ensureDriveFolder();
  const existingId = await findBackupFileId(folderId);
  if(existingId){
    const wantsRestore = confirm("Found an existing backup in your Ledger App Data folder. Restore it to this device now?\n\nOK = restore that data here.\nCancel = keep this device's current data (it will overwrite the Drive copy on the next backup).");
    state.driveFileId = existingId;
    if(wantsRestore){
      await driveRestoreLatest();
      return;
    }
  }
  await doDriveBackup(false);
}

function checkOAuthEnvironment(){
  if(window.location.protocol === 'file:'){
    return "Google sign-in can't run from a file opened directly — it needs a real https address. Host the app first (Settings → \"See the 10-minute steps\" under Install, or the Drive setup guide), then open it from that address.";
  }
  if(window.self !== window.top){
    return "Google sign-in can't run inside an embedded preview or frame — this looks like it's loaded inside another page. Open the app directly in its own browser tab.";
  }
  if(window.location.protocol === 'http:' && !['localhost','127.0.0.1'].includes(window.location.hostname)){
    return 'Google sign-in needs https (or http://localhost for local testing) — this page is loaded over plain http.';
  }
  return null;
}

function connectDrive(clientId){
  const envIssue = checkOAuthEnvironment();
  if(envIssue){ toast(envIssue); return; }
  if(clientId.startsWith('AIza')){
    toast("That looks like an API key, not an OAuth Client ID. You need Credentials → OAuth client ID → Web application (it ends in .apps.googleusercontent.com).");
    return;
  }
  if(!clientId.endsWith('.apps.googleusercontent.com')){
    toast("That doesn't look like a Google OAuth Client ID — it should end in .apps.googleusercontent.com");
    return;
  }
  state.driveClientId = clientId;
  state.driveEnabled = true;
  persist();
  if(!initGis()){ toast('Could not load Google sign-in. Try reloading the page.'); return; }
  pendingDriveIntent = 'connect';
  gisTokenClient.requestAccessToken({prompt:'consent'});
}

function disconnectDrive(){
  state.driveEnabled = false;
  driveAccessToken = null;
  persist();
  renderAll();
  toast('Google Drive disconnected');
}

const DRIVE_FOLDER_NAME = 'Ledger App Data';

async function ensureDriveFolder(){
  if(state.driveFolderId) return state.driveFolderId;
  try{
    const q = encodeURIComponent(`name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(res.ok){
      const data = await res.json();
      if(data.files && data.files.length){
        state.driveFolderId = data.files[0].id;
        await persist();
        return state.driveFolderId;
      }
    }
  }catch(e){ /* fall through to create */ }
  try{
    const res = await fetch('https://www.googleapis.com/drive/v3/files', {
      method:'POST',
      headers:{'Authorization':'Bearer '+driveAccessToken, 'Content-Type':'application/json'},
      body: JSON.stringify({name:DRIVE_FOLDER_NAME, mimeType:'application/vnd.google-apps.folder'})
    });
    if(res.ok){
      const data = await res.json();
      state.driveFolderId = data.id;
      await persist();
      return state.driveFolderId;
    }
  }catch(e){ /* ignore */ }
  return null;
}

async function doDriveBackup(silent){
  if(!driveAccessToken){
    if(!silent){ pendingDriveIntent = 'backup'; if(initGis()) gisTokenClient.requestAccessToken({prompt:'consent'}); }
    return;
  }
  try{
    const folderId = await ensureDriveFolder();

    // If we don't have a cached file ID yet, check whether one already exists in the
    // folder (e.g. created by another device) before ever creating a new one — this
    // is what was silently producing duplicate "ledger-latest-backup.json" files.
    if(!state.driveFileId && folderId){
      const existing = await findBackupFileId(folderId);
      if(existing) state.driveFileId = existing;
    }

    // Migrate a pre-existing backup file (created before the dedicated folder existed) into the folder.
    if(state.driveFileId && folderId && !state.driveFileMovedToFolder){
      try{
        const moveRes = await fetch(`https://www.googleapis.com/drive/v3/files/${state.driveFileId}?addParents=${folderId}&removeParents=root&fields=id,parents`, {
          method:'PATCH',
          headers:{'Authorization':'Bearer '+driveAccessToken}
        });
        if(moveRes.ok){ state.driveFileMovedToFolder = true; }
        else if(moveRes.status===404){
          // The old file id no longer exists (deleted/moved manually) — forget it and create a fresh one in the folder.
          state.driveFileId = null;
        }
      }catch(e){ /* non-fatal, will retry next backup */ }
    }

    const boundary = 'ledgerBoundary'+Date.now();
    const metadata = {name:'ledger-latest-backup.json', mimeType:'application/json'};
    if(!state.driveFileId && folderId) metadata.parents = [folderId];
    const payload = JSON.stringify(state);
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n`+
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n`+
      `--${boundary}--`;
    const url = state.driveFileId
      ? `https://www.googleapis.com/upload/drive/v3/files/${state.driveFileId}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method = state.driveFileId ? 'PATCH' : 'POST';
    const res = await fetch(url, {method, headers:{'Authorization':'Bearer '+driveAccessToken, 'Content-Type':'multipart/related; boundary='+boundary}, body});
    if(res.ok){
      const data = await res.json();
      if(data.id) state.driveFileId = data.id;
      state.driveFileMovedToFolder = true;
      state.lastDriveBackup = todayStr();
      state.lastDriveBackupAt = Date.now();
      await persist();
      if(!silent) toast('Backed up to Google Drive');
      doDriveSnapshot();
    }else if(res.status===401){
      driveAccessToken = null;
      if(!silent) toast('Google Drive session expired — reconnect below');
    }else{
      if(!silent) toast('Drive backup failed (error '+res.status+')');
    }
  }catch(e){
    if(!silent) toast('Drive backup failed — check your connection');
  }
}

async function driveRestoreRequest(){
  if(!confirm('This replaces everything currently on this device with the latest Drive backup. Continue?')) return;
  if(!driveAccessToken){
    const envIssue = checkOAuthEnvironment();
    if(envIssue){ toast(envIssue); return; }
    pendingDriveIntent = 'restore';
    if(initGis()) gisTokenClient.requestAccessToken({prompt:'consent'});
    toast('Signing in — restoring as soon as you approve');
    return;
  }
  await driveRestoreLatest();
}
async function driveRestoreLatest(){
  try{
    const folderId = await ensureDriveFolder();
    // The file ID may only be known to whichever device created it — always
    // look it up by name inside the shared folder (newest first) so restore
    // works on any device and isn't fooled by an old/duplicate file.
    const found = await findBackupFileId(folderId);
    const fileId = found || state.driveFileId;
    if(!fileId){ toast('No Drive backup found yet — back up from another device first'); return; }
    const res2 = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {headers:{'Authorization':'Bearer '+driveAccessToken}});
    if(!res2.ok){ toast('Could not fetch backup (error '+res2.status+')'); return; }
    const data = await res2.json();
    if(!data.transactions){ toast('That backup file looks invalid'); return; }
    const keep = {driveClientId:state.driveClientId, driveFileId:fileId, driveFolderId:state.driveFolderId, driveEnabled:state.driveEnabled};
    state = Object.assign(data, keep);
    migrateState();
    await persist(); renderAll(); toast('Restored latest backup from Drive');
  }catch(e){ toast('Restore failed — check your connection'); }
}

async function maybeAutoBackup(){
  const now = Date.now();
  const DAY = 24*60*60*1000;
  if(state.autoLocalBackup && (!state.lastLocalBackupAt || now - state.lastLocalBackupAt >= DAY)){
    triggerLocalBackup();
    state.lastLocalBackup = todayStr();
    state.lastLocalBackupAt = now;
    await persist();
  }
  if(state.driveEnabled && state.driveClientId && (!state.lastDriveBackupAt || now - state.lastDriveBackupAt >= DAY)){
    if(initGis()){
      pendingDriveIntent = 'backup';
      gisTokenClient.requestAccessToken({prompt:''});
    }
  }
}

/* ============ RECURRING TX AUTO-ADD ============ */
async function applyRecurring(){
  const currentMk = monthKey(new Date());
  const byKey = {};
  state.transactions.filter(t=>t.recurring).forEach(t=>{
    let key;
    if(t.type==='transfer') key = 'transfer|'+t.fromAccountId+'|'+t.toAccountId+'|'+t.note;
    else if(t.type==='saving') key = 'saving|'+t.goalId+'|'+t.accountId+'|'+t.direction+'|'+t.note;
    else key = t.category+'|'+t.type+'|'+t.accountId+'|'+t.note;
    if(!byKey[key] || byKey[key].date < t.date) byKey[key] = t;
  });
  let changed = false;
  Object.values(byKey).forEach(t=>{
    if(t.date.slice(0,7) < currentMk){
      let already;
      if(t.type==='transfer'){
        already = state.transactions.some(x=> x.recurring && x.type==='transfer' && x.fromAccountId===t.fromAccountId && x.toAccountId===t.toAccountId && x.note===t.note && x.date.slice(0,7)===currentMk);
      } else if(t.type==='saving'){
        already = state.transactions.some(x=> x.recurring && x.type==='saving' && x.goalId===t.goalId && x.accountId===t.accountId && x.direction===t.direction && x.note===t.note && x.date.slice(0,7)===currentMk);
      } else {
        already = state.transactions.some(x=> x.recurring && x.category===t.category && x.accountId===t.accountId && x.note===t.note && x.date.slice(0,7)===currentMk);
      }
      if(!already){
        state.transactions.push(Object.assign({}, t, {id:uid(), date: currentMk+'-'+t.date.slice(8,10), createdAt:Date.now()}));
        changed = true;
      }
    }
  });
  if(changed) await persist();
}

document.addEventListener('change', (e)=>{
  if(e.target.id==='txSearch'){ ui.txFilter.search = e.target.value; renderTransactions(); }
  if(e.target.id==='txTypeFilter'){ ui.txFilter.type = e.target.value; renderTransactions(); }
  if(e.target.id==='txCatFilter'){ ui.txFilter.category = e.target.value; renderTransactions(); }
  if(e.target.id==='currencySelect'){ currencySet(e.target.value).then(renderAll); }
  if(e.target.id==='importFile'){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const data = JSON.parse(reader.result);
        if(!data.transactions) throw new Error('bad format');
        state = data;
        migrateState();
        await persist(); renderAll(); toast('Data imported');
      }catch(err){ toast('Could not read that file'); }
    };
    reader.readAsText(file);
  }
});

document.addEventListener('input', (e)=>{
  if(e.target.id==='txSearch'){ ui.txFilter.search = e.target.value; renderTransactions(); }
});

document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeModal();
});

/* ============ INIT ============ */
async function init(){
  let loaded = null;
  const folderReconnected = await reconnectLocalFolder();
  if(folderReconnected){
    loaded = await readFromLocalFolder();
  }
  if(!loaded){
    loaded = await storageGet();
  }
  state = loaded || defaultState();
  if(folderReconnected) state.localFolderConnected = true;
  migrateState();
  applyTheme();
  renderAll();

  let householdConnected = false;
  if(state.firebaseConfig){
    const ok = await initFirebase(state.firebaseConfig);
    if(ok && state.householdId){
      startHouseholdListeners();
      householdConnected = true;
    }
  }
  if(!householdConnected){
    await ensureCategoryV2Seed();
    await ensureCategoryIconsSeed();
  }
  if(!householdActive()) await applyRecurring();
  // Make sure the local folder (if just reconnected) has the fully-migrated state written to it too.
  if(folderHandle) await writeToLocalFolder();
  await persist();
  renderAll();
  setTimeout(maybeAutoBackup, 800);
  setInterval(maybeAutoBackup, 60*60*1000);
  setInterval(checkDailyReminder, 60*1000);
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  }
}
init();
</script>
