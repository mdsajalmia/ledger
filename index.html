<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Ledger — Smart Money Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#424242">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#424242;
  --ink-2:#363636;
  --ink-soft:#575757;
  --canvas:#F6F7F9;
  --card:#FFFFFF;
  --line:#EAECEF;
  --text:#212121;
  --text-soft:#6B7280;
  --text-faint:#9AA1AC;
  --emerald:#01AA71;
  --emerald-soft:#DDF4EB;
  --coral:#F1472B;
  --coral-soft:#FCE3DF;
  --gold:#EC407A;
  --gold-soft:#FCE1EC;
  --gold-dark:#AD1457;
  --info:#AD1457;
  --info-soft:#F5E1EA;
  --radius:16px;
  --radius-sm:10px;
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, sans-serif;
  --font-mono:'IBM Plex Mono', 'Courier New', monospace;
  --shadow: 0 1px 2px rgba(33,33,33,.05), 0 8px 24px rgba(33,33,33,.08);
}
html[data-theme="dark"]{
  color-scheme: dark;
  --canvas:#1C1C1C;
  --card:#282828;
  --line:#3D3D3D;
  --text:#F2F2F2;
  --text-soft:#ABABAB;
  --text-faint:#7A7A7A;
  --emerald-soft:#0E3B2C;
  --coral-soft:#3D2019;
  --gold-soft:#3D1F2C;
  --info-soft:#331A26;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
}
html[data-theme="dark"] body{background:var(--canvas);color:var(--text);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--canvas);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#c7cdc3;border-radius:8px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}

#app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:224px;flex-shrink:0;background:linear-gradient(165deg,var(--emerald) 0%,var(--info) 100%);color:#fff;
  display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 26px;}
.brand-mark{width:32px;height:32px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--emerald);box-shadow:0 3px 10px rgba(0,0,0,.18);}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:.2px;}
.brand-sub{font-size:10.5px;color:rgba(255,255,255,.8);letter-spacing:.6px;text-transform:uppercase;margin-top:-2px;}

.nav{display:flex;flex-direction:column;gap:2px;flex:1;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border:none;background:transparent;color:rgba(255,255,255,.82);
  border-radius:10px;font-size:14px;font-weight:500;text-align:left;transition:.15s;
}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.9;}
.nav-item:hover{background:rgba(255,255,255,.14);color:#fff;}
.nav-item.active{background:#fff;color:var(--emerald);}
.nav-item.active svg{opacity:1;}
.nav-icon-only{justify-content:center;padding:12px;}
.nav-icon-only svg{width:20px;height:20px;}

.sidebar-foot{padding:12px 10px 0;border-top:1px solid rgba(255,255,255,.25);margin-top:10px;}
.sidebar-net{font-family:var(--font-mono);}
.sidebar-net .lbl{font-size:10.5px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;}
.sidebar-net .val{font-size:19px;font-weight:600;margin-top:2px;color:#fff;}
.sidebar-break{display:flex;flex-direction:column;gap:3px;margin-top:10px;font-size:11px;color:rgba(255,255,255,.75);}
.sidebar-break span b{color:#fff;font-weight:600;font-family:var(--font-mono);}
.sidebar-break .row{display:flex;justify-content:space-between;}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;padding:20px 32px;
  border-bottom:1px solid var(--line);background:var(--canvas);position:sticky;top:0;z-index:20;
  flex-wrap:wrap;gap:10px;
}
.topbar h1{font-family:var(--font-body);font-size:21px;font-weight:700;margin:0;letter-spacing:-.3px;}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

.month-switch{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:4px;}
.month-switch button{width:28px;height:28px;border:none;background:transparent;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-soft);}
.month-switch button svg{width:16px;height:16px;}
.month-switch button:hover{background:var(--canvas);}
.month-switch .m-label{font-family:var(--font-mono);font-size:13px;font-weight:500;padding:0 6px;min-width:108px;text-align:center;}

.btn{border-radius:10px;border:1px solid var(--line);background:var(--card);padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--text);display:inline-flex;align-items:center;gap:6px;}
.btn:hover{border-color:#c4cbc0;}
.btn-primary{background:var(--emerald);color:#fff;border-color:var(--emerald);}
.btn-primary:hover{background:#018f5f;}
.btn-danger-ghost{color:var(--coral);border-color:var(--coral-soft);background:var(--coral-soft);}
.btn svg{width:15px;height:15px;}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;}

.view{padding:26px 32px 60px;}
.hide{display:none !important;}

/* CARDS */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:2fr 1fr;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.card-title{font-size:12.5px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin:0 0 4px;}

.stat-card .val{font-family:var(--font-mono);font-size:24px;font-weight:600;margin-top:6px;}
.stat-card .sub{font-size:12px;color:var(--text-faint);margin-top:4px;}
.stat-card{border-left:4px solid transparent;}
.stat-card.income{border-left-color:var(--emerald);}
.stat-card.expense{border-left-color:var(--coral);}
.stat-card.income .val{color:var(--emerald);}
.stat-card.expense .val{color:var(--coral);}
.stat-card .icon-badge{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;float:right;}
.stat-card .icon-badge svg{width:16px;height:16px;}
.icon-badge.em{background:var(--emerald);color:#fff;}
.icon-badge.co{background:var(--coral);color:#fff;}
.icon-badge.go{background:var(--gold);color:#fff;}
.icon-badge.nu{background:var(--ink);color:#fff;}
.icon-badge.in{background:var(--info);color:#fff;}

.section-head{display:flex;align-items:center;justify-content:space-between;margin:28px 0 12px;}
.section-head h2{font-family:var(--font-display);font-size:18px;font-weight:600;margin:0;}
.section-head .see-all{font-size:13px;color:var(--text-soft);font-weight:600;border:none;background:none;}

/* LEDGER LIST */
.ledger{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.ledger-date-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px 7px;font-size:12.5px;font-weight:600;color:var(--text-soft);}
.ledger-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);}
.ledger-row:last-child{border-bottom:none;}
.ledger-row:hover{background:#FAFAF7;}
.cat-dot{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:600;color:#fff;}
.cat-dot svg{width:16px;height:16px;}
.ledger-mid{flex:1;min-width:0;}
.ledger-mid .desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ledger-mid .meta{font-size:12px;color:var(--text-faint);margin-top:1px;}
.ledger-leader{display:none;}
.ledger-amt{font-family:var(--font-mono);font-size:14.5px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.ledger-amt.in{color:var(--emerald);}
.ledger-amt.out{color:var(--coral);}
.ledger-actions{display:flex;gap:4px;opacity:0;transition:.15s;}
.ledger-row:hover .ledger-actions{opacity:1;}
.icon-btn{width:28px;height:28px;border:none;background:transparent;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);}
.icon-btn:hover{background:var(--canvas);color:var(--text);}
.icon-btn svg{width:15px;height:15px;}

.empty{padding:44px 20px;text-align:center;color:var(--text-faint);}
.empty svg{width:34px;height:34px;margin-bottom:10px;opacity:.5;}
.empty p{margin:0;font-size:13.5px;}

/* BUDGET */
.assign-banner{display:flex;align-items:center;justify-content:space-between;border-radius:var(--radius);padding:16px 20px;margin-bottom:18px;border:1px solid;}
.assign-banner.pos{background:var(--emerald-soft);border-color:#c7e9da;}
.assign-banner.zero{background:var(--info-soft);border-color:#cfe0f2;}
.assign-banner.neg{background:var(--coral-soft);border-color:#f4cec5;}
.assign-banner .lbl{font-size:12.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);}
.assign-banner .amt{font-family:var(--font-mono);font-size:22px;font-weight:600;margin-top:2px;}
.assign-banner.pos .amt{color:var(--emerald);}
.assign-banner.zero .amt{color:var(--info);}
.assign-banner.neg .amt{color:var(--coral);}
.assign-banner .note{font-size:12.5px;color:var(--text-soft);max-width:260px;text-align:right;}

.budget-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
.budget-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;}
.budget-top .name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.budget-top .amt{font-family:var(--font-mono);font-size:12.5px;color:var(--text-soft);}
.bar-track{height:8px;border-radius:5px;background:var(--canvas);overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.budget-foot{display:flex;justify-content:space-between;margin-top:7px;font-size:11.5px;color:var(--text-faint);}

/* GOALS */
.goal-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.goal-ring-wrap{display:flex;gap:16px;align-items:center;}
.goal-info{flex:1;}
.goal-info .name{font-weight:600;font-size:15px;font-family:var(--font-display);}
.goal-info .sub{font-size:12px;color:var(--text-faint);margin-top:2px;}
.goal-info .amounts{font-family:var(--font-mono);font-size:13px;margin-top:8px;color:var(--text-soft);}
.goal-btns{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.goal-btns .btn{padding:6px 12px;font-size:12px;}

/* ACCOUNTS / WALLETS */
.wallet-group-head{display:flex;align-items:center;gap:8px;margin:24px 0 10px;}
.wallet-group-head .gicon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.wallet-group-head .gicon svg{width:14px;height:14px;}
.wallet-group-head h3{font-family:var(--font-display);font-size:16px;font-weight:600;margin:0;}
.wallet-group-head .gtotal{margin-left:auto;font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--text-soft);}
.wallet-card{position:relative;overflow:hidden;}
.wallet-card .wtag{position:absolute;top:0;right:0;width:56px;height:56px;border-radius:0 0 0 56px;opacity:.08;}
.preset-chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.preset-chip{border:1px solid var(--line);background:var(--canvas);border-radius:9px;padding:7px 10px;font-size:12.5px;font-weight:600;color:var(--text-soft);}
.preset-chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}

/* FORMS/MODAL */
.overlay{position:fixed;inset:0;background:rgba(16,27,45,.42);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);}
.modal-head h3{font-family:var(--font-display);font-size:18px;margin:0;font-weight:600;}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;}
.modal-foot{padding:16px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-soft);margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:var(--canvas);color:var(--text);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--ink-soft);outline-offset:0;background:var(--card);}
.seg{display:flex;background:var(--canvas);border-radius:10px;padding:3px;border:1px solid var(--line);}
.seg button{flex:1;border:none;background:transparent;padding:9px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--text-soft);}
.seg button.active.in{background:var(--emerald);color:#fff;}
.seg button.active.out{background:var(--coral);color:#fff;}
.seg-4{display:flex;background:var(--canvas);border-radius:10px;padding:3px;border:1px solid var(--line);flex-wrap:wrap;}
.seg-4 button{flex:1 1 45%;border:none;background:transparent;padding:8px 4px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--text-soft);}
.seg-4 button.active{color:#fff;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px;}
.chip{border:1px solid var(--line);background:var(--canvas);border-radius:20px;padding:6px 6px 6px 12px;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:2px;}
.chip .dot{width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0;}
.chip button{border:none;background:none;color:var(--text-faint);display:flex;padding:4px;border-radius:50%;}
.chip button:hover{background:var(--card);color:var(--text);}
.chip button svg{width:13px;height:13px;display:block;}
.checkline{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-soft);}
.checkline svg{width:16px;height:16px;flex-shrink:0;}
.mini-icon{width:16px;height:16px;flex-shrink:0;display:flex;}
.mini-icon svg{width:100%;height:100%;}
.swatches{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.icon-picker{display:flex;flex-wrap:wrap;gap:8px;}
.icon-pick{width:34px;height:34px;border-radius:9px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;opacity:.45;}
.icon-pick svg{width:16px;height:16px;}
.icon-pick.active{opacity:1;border-color:var(--text);}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;flex-shrink:0;}
.swatch.active{border-color:var(--text);}
.color-custom{width:44px;height:32px;border:1px solid var(--line);border-radius:8px;padding:2px;background:var(--canvas);}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.filter-bar input, .filter-bar select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:var(--card);}
.filter-bar .search-wrap{position:relative;flex:1;min-width:180px;}
.filter-bar .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-faint);}
.filter-bar .search-wrap input{width:100%;padding-left:32px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:500;z-index:200;box-shadow:var(--shadow);}

.legend{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.legend-row{display:flex;align-items:center;gap:9px;font-size:13px;}
.legend-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-row .lname{flex:1;color:var(--text-soft);}
.legend-row .lval{font-family:var(--font-mono);font-weight:600;}

/* MOBILE */
.mobile-nav{display:none;}
.fab{
  display:none; position:fixed; right:18px; bottom:78px; z-index:60;
  width:56px; height:56px; border-radius:50%; border:none;
  background:linear-gradient(160deg,var(--emerald),var(--info)); color:#fff;
  align-items:center; justify-content:center;
  box-shadow:0 8px 20px rgba(1,170,113,.38), 0 2px 8px rgba(33,33,33,.2);
}
.fab svg{width:24px;height:24px;}
.fab:active{transform:scale(0.94);}
@media (max-width:880px){
  .sidebar{display:none;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:1fr;}
  .grid-budgets{grid-template-columns:repeat(2,1fr) !important;}
  .grid-budgets .budget-card{padding:12px 12px;}
  .grid-budgets .budget-top .name{font-size:12.5px;gap:6px;}
  .grid-budgets .budget-top .amt{font-size:11px;}
  .grid-budgets .cat-dot{width:20px;height:20px;font-size:10px;}
  .grid-budgets .budget-top{flex-wrap:wrap;gap:4px;}
  .grid-2{grid-template-columns:1fr;}
  .view{padding:18px 14px 90px;}
  .topbar{padding:14px 16px;}
  .topbar h1{font-size:19px;}
  .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(100deg,var(--emerald) 0%,var(--info) 100%);z-index:50;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));justify-content:space-around;
  }
  .mobile-nav button{background:none;border:none;color:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;padding:10px;border-radius:12px;flex:1;min-width:0;}
  .mobile-nav button svg{width:22px;height:22px;}
  .mobile-nav button.active{color:var(--emerald);background:#fff;}
  body{padding-bottom:0;}
  .ledger-row{gap:10px;padding:11px 14px;}
  .ledger-leader{display:none;}
  .ledger-mid .desc{max-width:100%;}
  .cat-dot{width:30px;height:30px;}
  .ledger-actions{opacity:1;}
  .fab{display:flex;}
}
@media (max-width:520px){
  .row2{grid-template-columns:1fr;}
  .assign-banner{flex-direction:column;align-items:flex-start;gap:8px;}
  .assign-banner .note{text-align:left;max-width:none;}
}
.section-note{font-size:12.5px;color:var(--text-faint);margin-top:-4px;}

.print-only{display:none;}
@media print{
  #app{display:none !important;}
  #modalRoot, #toastRoot{display:none !important;}
  .print-only{display:block;font-family:'Inter',sans-serif;color:#111;padding:20px;}
  .print-only h1{font-size:22px;margin:0 0 2px;}
  .print-only .print-sub{color:#666;font-size:12.5px;margin-bottom:18px;}
  .print-only table{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:8px;}
  .print-only th{text-align:left;border-bottom:2px solid #333;padding:6px 8px;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;}
  .print-only td{padding:6px 8px;border-bottom:1px solid #ddd;}
  .print-only .print-stats{display:flex;gap:24px;margin:14px 0 20px;}
  .print-only .print-stat b{display:block;font-size:18px;}

/* ============ STORAGE ============ */
const STORAGE_KEY = 'ledger-money-app-v3';
const hasClaudeStorage = (typeof window.storage !== 'undefined' && window.storage);

async function storageGet(){
  if(hasClaudeStorage){
    try{ const r = await window.storage.get(STORAGE_KEY); return r ? JSON.parse(r.value) : null; }
    catch(e){ return null; }
  }else{
    try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
}
async function storageSet(data){
  const json = JSON.stringify(data);
  if(hasClaudeStorage){
    try{ await window.storage.set(STORAGE_KEY, json); }catch(e){ console.error('storage set failed', e); }
  }else{
    try{ localStorage.setItem(STORAGE_KEY, json); }catch(e){ console.error('storage set failed', e); }
  }
}

/* ============ LOCAL FOLDER (PRIMARY STORAGE ON THIS DEVICE) ============ */
const LOCAL_FOLDER_FILE = 'ledger-data.json';
let folderHandle = null;
const supportsLocalFolder = (typeof window.showDirectoryPicker === 'function');

function idbOpen(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open('ledger-fs-db', 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, val){
  const database = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = database.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(val, key);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}
async function idbGet(key){
  const database = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = database.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}

async function chooseLocalFolder(){
  if(!supportsLocalFolder){
    toast("This browser can't pick a folder — try Chrome on Android or desktop");
    return;
  }
  try{
    const handle = await window.showDirectoryPicker({mode:'readwrite'});
    folderHandle = handle;
    await idbSet('ledgerFolder', handle);
    state.localFolderConnected = true;
    await writeToLocalFolder();
    await persist();
    renderAll();
    toast('Folder connected — Ledger keeps your data file updated here');
  }catch(e){ /* user cancelled the picker */ }
}

async function reconnectLocalFolder(){
  if(!supportsLocalFolder) return false;
  try{
    const handle = await idbGet('ledgerFolder');
    if(!handle) return false;
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm === 'granted'){ folderHandle = handle; return true; }
    return false;
  }catch(e){ return false; }
}

async function writeToLocalFolder(){
  if(!folderHandle) return;
  try{
    const fileHandle = await folderHandle.getFileHandle(LOCAL_FOLDER_FILE, {create:true});
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
  }catch(e){ console.error('local folder write failed', e); }
}

async function readFromLocalFolder(){
  if(!folderHandle) return null;
  try{
    const fileHandle = await folderHandle.getFileHandle(LOCAL_FOLDER_FILE, {create:false});
    const file = await fileHandle.getFile();
    const text = await file.text();
    const data = JSON.parse(text);
    return data && data.transactions ? data : null;
  }catch(e){ return null; }
}

async function disconnectLocalFolder(){
  folderHandle = null;
  state.localFolderConnected = false;
  try{ await idbSet('ledgerFolder', null); }catch(e){}
  await persist();
  renderAll();
  toast('Local folder disconnected — browser storage stays as the backup');
}

/* ---- Day/Week/Month period switcher (Dashboard + Transactions) ---- */
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function startOfWeek(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  const diff = (day===0 ? -6 : 1-day);
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function periodRange(){
  const a = ui.period.anchor;
  if(ui.period.type==='day') return [a, a];
  if(ui.period.type==='week'){ const s=startOfWeek(a); return [s, addDays(s,6)]; }
  const [y,m] = a.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  return [a.slice(0,7)+'-01', a.slice(0,7)+'-'+String(last).padStart(2,'0')];
}
function fmtShortDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short', day:'numeric'});
}
function periodLabel(){
  const [s,e] = periodRange();
  if(ui.period.type==='day') return new Date(s+'T00:00:00').toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric', year:'numeric'});
  if(ui.period.type==='week') return fmtShortDate(s)+' – '+fmtShortDate(e);
  return monthLabel(s.slice(0,7));
}
function shiftPeriod(delta){
  if(ui.period.type==='day'){ ui.period.anchor = addDays(ui.period.anchor, delta); }
  else if(ui.period.type==='week'){ ui.period.anchor = addDays(ui.period.anchor, delta*7); }
  else { ui.period.anchor = shiftMonth(ui.period.anchor.slice(0,7), delta)+'-01'; }
}
function setPeriodType(type){
  ui.period.type = type;
}
function txForPeriod(){
  const [s,e] = periodRange();
  return state.transactions.filter(t => t.date>=s && t.date<=e);
}
function periodTotals(){
  const txs = txForPeriod();
  let income=0, expense=0, savings=0;
  txs.forEach(t=>{
    if(t.type==='income') income+=t.amount;
    else if(t.type==='expense') expense+=t.amount;
    else if(t.type==='saving') savings += (t.direction==='out' ? -t.amount : t.amount);
  });
  return {income, expense, savings, net: income-expense};
}
function periodCategorySpend(){
  const map = {};
  txForPeriod().filter(t=>t.type==='expense').forEach(t=>{ map[t.category] = (map[t.category]||0) + t.amount; });
  return map;
}
const CURRENCY_SYMBOLS = {BDT:'৳', USD:'$', EUR:'€', GBP:'£', INR:'₹', JPY:'¥'};
function fmt(n){
  const sym = CURRENCY_SYMBOLS[state.currency] || state.currency+' ';
  const neg = n < 0;
  const v = Math.abs(Math.round(n*100)/100);
  const s = v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg?'-':'') + sym + s;
}
function fmtCompact(n){
  const sym = CURRENCY_SYMBOLS[state.currency] || state.currency+' ';
  return sym + Math.round(n).toLocaleString();
}
function fmtCur(n, currency){
  const sym = CURRENCY_SYMBOLS[currency] || (currency||'')+' ';
  const neg = n < 0;
  const v = Math.abs(Math.round(n*100)/100);
  const s = v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg?'-':'') + sym + s;
}
function convertToBase(amount, fromCurrency){
  if(!fromCurrency || fromCurrency===state.currency) return amount;
  const rates = state.currencyRates || {BDT:1, USD:110, EUR:118};
  const fromRate = rates[fromCurrency];
  const baseRate = rates[state.currency];
  if(!fromRate || !baseRate) return amount; // no rate configured — treat as 1:1 rather than guessing
  return amount * (fromRate / baseRate);
}

/* ============ DERIVED HELPERS ============ */
function txForMonth(mk){
  return state.transactions.filter(t => t.date.slice(0,7) === mk);
}
function monthTotals(mk){
  const txs = txForMonth(mk);
  let income=0, expense=0, savings=0;
  txs.forEach(t=>{
    if(t.type==='income') income+=t.amount;
    else if(t.type==='expense') expense+=t.amount;
    else if(t.type==='saving') savings += (t.direction==='out' ? -t.amount : t.amount);
  });
  return {income, expense, savings, net: income-expense};
}
function categorySpend(mk){
  const txs = txForMonth(mk).filter(t=>t.type==='expense');
  const map = {};
  txs.forEach(t=>{ map[t.category] = (map[t.category]||0) + t.amount; });
  return map;
}
function accountBalance(accId){
  const acc = state.accounts.find(a=>a.id===accId);
  if(!acc) return 0;
  let bal = acc.initial || 0;
  state.transactions.forEach(t=>{
    if(t.type==='income' && t.accountId===accId) bal += t.amount;
    else if(t.type==='expense' && t.accountId===accId) bal -= t.amount;
    else if(t.type==='transfer'){
      if(t.fromAccountId===accId) bal -= t.amount;
      if(t.toAccountId===accId) bal += t.amount;
    }
    else if(t.type==='saving' && t.accountId===accId){
      bal += (t.direction==='out' ? t.amount : -t.amount);
    }
  });
  return bal;
}
function totalNetBalance(){
  let bal = 0;
  state.accounts.forEach(a=>{ if(a.showInTotal!==false) bal += accountBalance(a.id); });
  return bal;
}
function balanceByGroup(){
  const out = {cash:0, bank:0, mobile:0, other:0};
  state.accounts.forEach(a=>{ if(a.showInTotal!==false) out[a.group||'other'] = (out[a.group||'other']||0) + accountBalance(a.id); });
  return out;
}
function goalSavedTotal(goalId){
  const g = state.goals.find(x=>x.id===goalId);
  if(!g) return 0;
  let total = g.startingSaved || 0;
  state.transactions.forEach(t=>{
    if(t.type==='saving' && t.goalId===goalId){
      total += (t.direction==='out' ? -t.amount : t.amount);
    }
  });
  return total;
}
function lastNMonths(n){
  const arr=[]; const now = new Date(ui.month+'-01T00:00:00');
  for(let i=n-1;i>=0;i--){ arr.push(monthKey(new Date(now.getFullYear(), now.getMonth()-i, 1))); }
  return arr;
}
function readyToAssign(mk){
  const income = monthTotals(mk).income;
  const assigned = Object.values(state.budgets).reduce((s,v)=>s+(v||0),0);
  return income - assigned;
}

/* ---- Statistics ---- */
function natureBreakdown(mk){
  const out = {must:0, need:0, want:0, unspecified:0};
  txForMonth(mk).filter(t=>t.type==='expense').forEach(t=>{
    const k = t.nature || 'unspecified';
    out[k] = (out[k]||0) + t.amount;
  });
  return out;
}
function dayOfWeekSpend(mk){
  const out = [0,0,0,0,0,0,0];
  txForMonth(mk).filter(t=>t.type==='expense').forEach(t=>{
    out[new Date(t.date+'T00:00:00').getDay()] += t.amount;
  });
  return out;
}
function statsForMonth(mk){
  const txs = txForMonth(mk);
  const totals = monthTotals(mk);
  const [y,m] = mk.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const today = new Date();
  const isCurrentMonth = monthKey(today)===mk;
  const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
  const avgDaily = daysElapsed>0 ? totals.expense/daysElapsed : 0;
  const spend = categorySpend(mk);
  const topCat = Object.entries(spend).sort((a,b)=>b[1]-a[1])[0] || null;
  const biggestTx = txs.filter(t=>t.type==='expense').slice().sort((a,b)=>b.amount-a.amount)[0] || null;
  const savingsRate = totals.income>0 ? Math.round((totals.net/totals.income)*100) : 0;
  return { avgDaily, topCat, biggestTx, savingsRate, txCount: txs.length };
}

/* ---- Net worth timeline (Dashboard) ---- */
function lastNMonthsFromToday(n){
  const arr=[]; const now = new Date();
  for(let i=n-1;i>=0;i--){ arr.push(monthKey(new Date(now.getFullYear(), now.getMonth()-i, 1))); }
  return arr;
}
function netWorthAsOf(dateStr){
  let total = 0;
  state.accounts.forEach(a=>{
    let bal = a.initial || 0;
    state.transactions.forEach(t=>{
      if(t.date > dateStr) return;
      if(t.type==='income' && t.accountId===a.id) bal += t.amount;
      else if(t.type==='expense' && t.accountId===a.id) bal -= t.amount;
      else if(t.type==='transfer'){ if(t.fromAccountId===a.id) bal -= t.amount; if(t.toAccountId===a.id) bal += t.amount; }
      else if(t.type==='saving' && t.accountId===a.id){ bal += (t.direction==='out' ? t.amount : -t.amount); }
    });
    total += bal;
  });
  return total;
}
function netWorthSeries(n){
  const months = lastNMonthsFromToday(n);
  return months.map(mk=>{
    const [y,m] = mk.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    return netWorthAsOf(mk+'-'+String(lastDay).padStart(2,'0'));
  });
}

/* ---- Spending heatmap (Dashboard) ---- */
function spendingHeatmapData(weeks){
  const days = weeks*7;
  const today = new Date();
  const byDate = {};
  state.transactions.forEach(t=>{ if(t.type==='expense'){ byDate[t.date] = (byDate[t.date]||0) + t.amount; } });
  const out = [];
  for(let i=days-1;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    out.push({date:key, amount: byDate[key]||0, dow: d.getDay()});
  }
  return out;
}

    <div style="font-family:var(--font-mono);font-size:21px;font-weight:600;margin:4px 0 8px;">${fmt(current)}</div>
    ${svgLineChart(labels, series, 'var(--emerald)')}
  </div>`;
}

function renderHeatmapCard(){
  const data = spendingHeatmapData(12);
  const max = Math.max(1, ...data.map(d=>d.amount));
  // pad the front so the grid starts on a Monday column
  const lead = (data[0].dow===0 ? 6 : data[0].dow-1);
  const cells = [];
  for(let i=0;i<lead;i++) cells.push(null);
  data.forEach(d=>cells.push(d));
  const weeks = Math.ceil(cells.length/7);
  let grid = `<div style="display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:3px;overflow-x:auto;padding-bottom:4px;">`;
  for(let i=0;i<weeks*7;i++){
    const d = cells[i];
    if(!d){ grid += `<div style="width:13px;height:13px;"></div>`; continue; }
    const t = d.amount/max;
    const bg = d.amount===0 ? 'var(--canvas)' : `rgba(241,71,43,${(0.15+t*0.75).toFixed(2)})`;
    grid += `<div title="${d.date}: ${fmt(d.amount)}" style="width:13px;height:13px;border-radius:3px;background:${bg};"></div>`;
  }
  grid += `</div>`;
  return `<div class="card" style="margin-top:16px;">
    <div class="card-title">Spending activity — last 12 weeks</div>
    <div style="margin-top:10px;">${grid}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--text-faint);">
      <span>Less</span>
      <span style="width:11px;height:11px;border-radius:3px;background:var(--canvas);display:inline-block;"></span>
      <span style="width:11px;height:11px;border-radius:3px;background:rgba(241,71,43,.3);display:inline-block;"></span>
      <span style="width:11px;height:11px;border-radius:3px;background:rgba(241,71,43,.55);display:inline-block;"></span>
      <span style="width:11px;height:11px;border-radius:3px;background:rgba(241,71,43,.9);display:inline-block;"></span>
      <span>More</span>
    </div>
  </div>`;
}

function renderSpendingRing(expense){
  const totalBudgeted = Object.values(state.budgets).reduce((s,v)=>s+(v||0),0);
  if(totalBudgeted<=0) return '';
  const pct = Math.min(100, Math.round((expense/totalBudgeted)*100));
  const over = expense>totalBudgeted;
  const r=52, c=2*Math.PI*r; const off = c-(Math.min(pct,100)/100)*c;
  return `<div class="card" style="margin-top:16px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;">
    <svg width="128" height="128" viewBox="0 0 128 128" style="flex-shrink:0;">
      <circle cx="64" cy="64" r="${r}" fill="none" stroke="var(--canvas)" stroke-width="11"/>
      <circle cx="64" cy="64" r="${r}" fill="none" stroke="${over?'var(--coral)':'var(--emerald)'}" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 64 64)"/>
      <text x="64" y="60" text-anchor="middle" font-family="IBM Plex Mono" font-size="19" font-weight="600" fill="var(--text)">${pct}%</text>
      <text x="64" y="76" text-anchor="middle" font-family="Inter" font-size="9.5" fill="var(--text-faint)">of budget</text>
    </svg>
    <div>
      <div class="card-title">This month's spending</div>
      <div style="font-family:var(--font-mono);font-size:23px;font-weight:600;margin-top:4px;color:${over?'var(--coral)':'var(--text)'}">${fmt(expense)}</div>
      <div class="section-note" style="margin-top:2px;">of ${fmt(totalBudgeted)} budgeted${over?' — over limit':''}</div>
    </div>
  </div>`;
}

function debtMonthlyTotals(mk){
  let borrowed=0, lent=0;
  state.debts.forEach(d=>{
    if(d.date && d.date.slice(0,7)===mk){
      if(d.type==='borrowed') borrowed += d.amount; else lent += d.amount;
    }
  });
  return {borrowed, lent};
}

function renderBorrowLendChart(){
  const months = lastNMonthsFromToday(3);
  const labels = months.map(m=>monthLabel(m).split(' ')[0].slice(0,3));
  const borrowedSeries = months.map(m=>debtMonthlyTotals(m).borrowed);
  const lentSeries = months.map(m=>debtMonthlyTotals(m).lent);
  const hasAny = borrowedSeries.some(v=>v>0) || lentSeries.some(v=>v>0);
  return `<div class="card" style="margin-top:16px;">
    <div class="card-title">Borrow &amp; lend — last 3 months</div>
    ${hasAny ? `
      ${svgMultiLineChart(labels, [
        {name:'Borrowed', color:'var(--coral)', data:borrowedSeries},
        {name:'Lent', color:'var(--emerald)', data:lentSeries}
      ])}
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text-soft);">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--coral);margin-right:5px;"></span>Borrowed</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--emerald);margin-right:5px;"></span>Lent</span>
      </div>

}

    <div class="card-title">Expense structure — ${monthLabel(mk)}</div>
    ${rows.length ? `<div style="display:flex;flex-direction:column;gap:11px;margin-top:10px;">
      ${rows.map(([c,v])=>`

            <strong style="font-family:var(--font-mono);">${fmt(v)}</strong>

}

    <div><div class="card-title" style="margin-bottom:2px;">Total balance across wallets</div><div style="font-family:var(--font-mono);font-size:19px;font-weight:600;">${fmt(totalNetBalance())}</div></div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--text-soft);">

    </div>

  if(overBudget.length){
    html += `<div class="card" style="margin-top:16px;border-color:var(--coral-soft);background:var(--coral-soft);display:flex;gap:10px;align-items:flex-start;">
      <div class="mini-icon" style="color:var(--coral);margin-top:1px;">${I('alert')}</div>
      <div style="font-size:13.5px;color:#7a2e21;"><strong>${overBudget.length} budget${overBudget.length>1?'s':''} over limit this month:</strong> ${overBudget.map(esc).join(', ')}</div>

  }

  const totalCurrentInvestment = state.investments.filter(i=>!i.soldDate).reduce((s,i)=>s+convertToBase(investmentCurrentValue(i), i.currency),0);

  html += `<div class="grid" style="grid-template-columns:repeat(2,1fr);">
    <div class="card stat-card income">
      <div class="icon-badge em">${I('arrowDown')}</div>
      <div class="card-title">Income</div>
      <div class="val">${fmt(totals.income)}</div>
    </div>
    <div class="card stat-card expense">
      <div class="icon-badge co">${I('arrowUp')}</div>

      <div class="val">${fmt(totals.expense)}</div>

      <div class="card-title">Net</div>

      <div class="sub">${savedRate}% of income kept</div>

  // 3. Borrow & lend comparison chart
  html += renderBorrowLendChart();

  // 6. Last 10-15 transactions

function renderBudgetMini(){
  const cats = Object.keys(state.budgets).filter(c=>state.budgets[c]>0);
  if(!cats.length) return `<div class="card empty">${I('inbox')}<p>No budgets set yet. Head to Budgets to add limits.</p></div>`;
  const spend = categorySpend(ui.month);
  return `<div style="display:flex;flex-direction:column;gap:10px;">` + cats.slice(0,5).map(c=>{
    const limit = state.budgets[c]; const spent = spend[c]||0;
    const pct = Math.min(100, Math.round((spent/limit)*100));
    const over = spent>limit;
    return `<div class="budget-card">
      <div class="budget-top">
        <div class="name"><span class="cat-dot" style="width:22px;height:22px;font-size:11px;background:${catColor(c)}">${catDotContent(c)}</span>${esc(c)}</div>
        <div class="amt">${fmt(spent)} / ${fmt(limit)}</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--coral)':'var(--emerald)'}"></div></div>
    </div>`;
  }).join('') + `</div>`;
}

function dateHeaderLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const dOnly = new Date(d); dOnly.setHours(0,0,0,0);
  if(dOnly.getTime()===today.getTime()) return 'Today';
  if(dOnly.getTime()===yest.getTime()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric', year:'numeric'});
}

function renderLedgerRow(t){
  if(t.type==='transfer'){
    const from = state.accounts.find(a=>a.id===t.fromAccountId);
    const to = state.accounts.find(a=>a.id===t.toAccountId);
    return `<div class="ledger-row">
      <div class="cat-dot" style="background:var(--info)">${I('swap')}</div>
      <div class="ledger-mid">
        <div class="desc">${esc(t.note) || 'Transfer'}</div>
        <div class="meta">${esc(from?from.name:'?')} → ${esc(to?to.name:'?')}${t.recurring?' · recurring':''}</div>
      </div>
      <div class="ledger-leader"></div>
      <div class="ledger-amt" style="color:var(--info)">${fmt(t.amount)}</div>
      <div class="ledger-actions">
        <button class="icon-btn" data-action="edit-tx" data-id="${t.id}">${I('edit')}</button>
        <button class="icon-btn" data-action="delete-tx" data-id="${t.id}">${I('trash')}</button>
      </div>
    </div>`;
  }
  if(t.type==='saving'){
    const g = state.goals.find(x=>x.id===t.goalId);
    const acc = state.accounts.find(a=>a.id===t.accountId);
    const out = t.direction==='out';
    return `<div class="ledger-row">
      <div class="cat-dot" style="background:var(--gold)">${I('goals')}</div>
      <div class="ledger-mid">
        <div class="desc">${esc(t.note) || ((out?'Withdraw: ':'Goal: ')+(g?g.name:'Deleted goal'))}</div>
        <div class="meta">${acc?esc(acc.name):''}${t.recurring?' · recurring':''}</div>
      </div>
      <div class="ledger-leader"></div>
      <div class="ledger-amt" style="color:var(--gold-dark)">${out?'-':'+'}${fmt(t.amount)}</div>
      <div class="ledger-actions">
        <button class="icon-btn" data-action="edit-tx" data-id="${t.id}">${I('edit')}</button>
        <button class="icon-btn" data-action="delete-tx" data-id="${t.id}">${I('trash')}</button>
      </div>
    </div>`;
  }
  const acc = state.accounts.find(a=>a.id===t.accountId);
  const natureTag = t.type==='expense' && t.nature ? ` · <span style="text-transform:capitalize;">${esc(t.nature)}</span>` : '';
  return `<div class="ledger-row">
    <div class="cat-dot" style="background:${catColor(t.category)}">${catDotContent(t.category)}</div>
    <div class="ledger-mid">
      <div class="desc">${esc(t.note || t.category)}</div>
      <div class="meta">${esc(t.category)}${t.subcategory?' · '+esc(t.subcategory):''}${acc?' · '+esc(acc.name):''}${natureTag}${t.recurring?' · recurring':''}</div>
    </div>
    <div class="ledger-leader"></div>
    <div class="ledger-amt ${t.type==='income'?'in':'out'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
    <div class="ledger-actions">
      <button class="icon-btn" data-action="edit-tx" data-id="${t.id}">${I('edit')}</button>
      <button class="icon-btn" data-action="delete-tx" data-id="${t.id}">${I('trash')}</button>
    </div>
  </div>`;
}

function renderLedgerList(txs){
  if(!txs.length) return `<div class="ledger empty">${I('inbox')}<p>No transactions yet.</p></div>`;
  let out = '';
  let lastDate = null;
  txs.forEach(t=>{
    if(t.date !== lastDate){
      if(lastDate !== null) out += `</div>`; // close previous date's ledger block
      lastDate = t.date;
      let dayNet = 0;
      txs.forEach(x=>{ if(x.date===t.date){ if(x.type==='income') dayNet+=x.amount; else if(x.type==='expense') dayNet-=x.amount; } });
      out += `<div class="ledger-date-header"><span>${dateHeaderLabel(t.date)}</span><span style="color:${dayNet>=0?'var(--emerald)':'var(--coral)'};font-family:var(--font-mono);">${dayNet>=0?'+':''}${fmt(dayNet)}</span></div>`;
      out += `<div class="ledger">`;
    }
    out += renderLedgerRow(t);
  });
  out += `</div>`;
  return out;
}

/* ============ RENDER: TRANSACTIONS ============ */
function renderTransactions(){

  txs = txs.slice().sort((a,b)=> b.date.localeCompare(a.date) || (b.createdAt||0)-(a.createdAt||0));

/* ============ RENDER: BUDGETS ============ */
function renderBudgets(){
  const mk = ui.period.anchor.slice(0,7);
  const spend = periodCategorySpend();
  const [y,m] = mk.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const proratedFactor = ui.period.type==='day' ? 1/daysInMonth : ui.period.type==='week' ? 7/daysInMonth : 1;
  const expenseCats = categoryList().filter(c=>catMeta(c).type==='expense');
  const rta = readyToAssign(mk);
  const bannerClass = rta>0 ? 'pos' : (rta===0 ? 'zero' : 'neg');
  const bannerNote = rta>0 ? 'Give this money a job — assign it to a category below.' : (rta===0 ? "Every taka has a job. That's zero-based budgeting." : 'You have assigned more than you earned this month.');

  let html = `<div class="assign-banner ${bannerClass}">
    <div>
      <div class="lbl">Ready to assign — ${monthLabel(mk)}</div>
      <div class="amt">${fmt(rta)}</div>
    </div>
    <div class="note">${bannerNote}</div>
  </div>`;
  html += `<div class="section-note" style="margin-bottom:16px;">Limits are set per month. Viewing by ${ui.period.type} shows your pace against a share of that monthly limit.</div>`;
  html += `<div class="grid grid-3 grid-budgets">` + expenseCats.map(c=>{
    const monthlyLimit = state.budgets[c] || 0;
    const limit = monthlyLimit * proratedFactor;
    const spent = spend[c] || 0;
    const pct = limit>0 ? Math.min(100, Math.round((spent/limit)*100)) : 0;
    const over = limit>0 && spent>limit;
    return `<div class="budget-card">
      <div class="budget-top">
        <div class="name"><span class="cat-dot" style="width:24px;height:24px;font-size:11px;background:${catColor(c)}">${catDotContent(c)}</span>${esc(c)}</div>
      </div>
      ${monthlyLimit>0 ? `
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--coral)':'var(--emerald)'}"></div></div>
        <div class="budget-foot"><span>${fmt(spent)} spent</span><span>${pct}% of ${fmt(limit)}</span></div>
        ${ui.period.type!=='month' ? `<div class="section-note" style="margin-top:4px;">${ui.period.type} pace vs ${fmt(monthlyLimit)}/month limit</div>` : ''}
      ` : `<div class="section-note">No limit set</div>`}
      <button class="btn" style="margin-top:12px;width:100%;justify-content:center;" data-action="set-budget" data-cat="${esc(c)}">${monthlyLimit>0?'Edit limit':'Set limit'}</button>
    </div>`;

function investmentSparkline(inv, color, h){
  const dateSet = new Set([inv.purchaseDate]);
  (inv.valueLog||[]).forEach(v=>dateSet.add(v.date));
  if(inv.soldDate) dateSet.add(inv.soldDate);
  const dates = Array.from(dateSet).sort();
  if(dates.length<2) return `<div class="section-note">Update its value a couple of times to see a trend line here.</div>`;
  const series = dates.map(d=>investmentValueAsOf(inv,d));
  return svgLineChart(dates.map(fmtShortDate), series, color, h||70);
}

function investmentHistory(){
  const rows = [];
  state.investments.forEach(inv=>{
    rows.push({date:inv.purchaseDate, type:'buy', name:inv.name, amount:inv.investedAmount, currency:inv.currency||state.currency});
    (inv.valueLog||[]).forEach(v=>{
      if(inv.soldDate && v.date===inv.soldDate) return; // shown as the sale itself instead
      rows.push({date:v.date, type:'value', name:inv.name, amount:v.value, currency:inv.currency||state.currency});
    });
    if(inv.soldDate){
      rows.push({date:inv.soldDate, type:'sell', name:inv.name, amount:inv.soldValue, currency:inv.currency||state.currency});
    }
  });
  return rows.sort((a,b)=> b.date.localeCompare(a.date));
}

function renderInvestments(){
  if(!state.investments.length){
    document.getElementById('viewRoot').innerHTML = `<div class="card empty">${I('trend')}<p>No investments tracked yet. Add one to start following its value over time.</p></div>`;
    return;
  }
  const active = state.investments.filter(i=>!i.soldDate);
  const closed = state.investments.filter(i=>i.soldDate);

  const totalInvested = active.reduce((s,i)=>s+convertToBase(i.investedAmount||0, i.currency),0);
  const totalCurrent = active.reduce((s,i)=>s+convertToBase(investmentCurrentValue(i), i.currency),0);
  const pl = totalCurrent-totalInvested;
  const plPct = totalInvested>0 ? Math.round((pl/totalInvested)*1000)/10 : 0;
  const over = pl>=0;
  const realizedPL = closed.reduce((s,i)=>s+convertToBase((i.soldValue||0)-(i.investedAmount||0), i.currency),0);

  const allocEntries = active.map((inv,i)=>({
    label: inv.name,
    value: Math.max(0.01, convertToBase(investmentCurrentValue(inv), inv.currency)),
    color: INVESTMENT_LINE_COLORS[i % INVESTMENT_LINE_COLORS.length]
  }));
  const allocTotal = allocEntries.reduce((s,e)=>s+e.value,0) || 1;

  let html = `<div class="card">
    <div class="card-title" style="text-align:center;">Portfolio allocation</div>
    ${allocEntries.length ? `
      <div style="display:flex;justify-content:center;margin:10px 0;">${svgDonut(allocEntries, 190)}</div>
      <div class="legend" style="max-width:360px;margin:0 auto;">
        ${allocEntries.map(e=>`
          <div class="legend-row">
            <span class="dot" style="background:${e.color}"></span>
            <span class="lname">${esc(e.label)}</span>
            <span class="lval">${Math.round(e.value/allocTotal*100)}%</span>
          </div>`).join('')}
      </div>
    ` : `<div class="empty">${I('inbox')}<p>No active holdings to chart.</p></div>`}
    <div style="display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line);text-align:center;">
      <div><div class="card-title">Total invested</div><div style="font-family:var(--font-mono);font-size:19px;font-weight:600;">${fmt(totalInvested)}</div></div>
      <div><div class="card-title">Current value</div><div style="font-family:var(--font-mono);font-size:19px;font-weight:600;">${fmt(totalCurrent)}</div></div>
      <div><div class="card-title">Profit / Loss</div><div style="font-family:var(--font-mono);font-size:19px;font-weight:600;color:${over?'var(--emerald)':'var(--coral)'};">${over?'+':''}${fmt(pl)} (${over?'+':''}${plPct}%)</div></div>
      ${closed.length?`<div><div class="card-title">Realized P/L</div><div style="font-family:var(--font-mono);font-size:19px;font-weight:600;color:${realizedPL>=0?'var(--emerald)':'var(--coral)'};">${realizedPL>=0?'+':''}${fmt(realizedPL)}</div></div>`:''}
    </div>
    <div class="section-note" style="text-align:center;margin-top:8px;">Mixed currencies are converted to ${state.currency} here using the rates in Settings — each holding below still shows its own currency.</div>
  </div>`;

  html += `<div class="section-head"><h2>Holdings</h2></div>`;
  html += `<div class="grid grid-3">` + active.map((inv,i)=>{
    const cur = investmentCurrentValue(inv);
    const ipl = cur-inv.investedAmount;
    const iplPct = inv.investedAmount>0 ? Math.round((ipl/inv.investedAmount)*1000)/10 : 0;
    const iover = ipl>=0;
    const color = INVESTMENT_LINE_COLORS[i % INVESTMENT_LINE_COLORS.length];
    return `<div class="card">
      <div class="card-title">${esc(inv.category)}${inv.currency && inv.currency!==state.currency ? ' · '+inv.currency : ''}</div>
      <div style="font-family:var(--font-display);font-size:16px;font-weight:600;margin-top:2px;">${esc(inv.name)}</div>
      <div class="section-note" style="margin-top:2px;">Since ${inv.purchaseDate}</div>
      <div style="margin-top:8px;">${investmentSparkline(inv, color)}</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-family:var(--font-mono);font-size:13px;">
        <span style="color:var(--text-faint);">Invested</span><span>${fmtCur(inv.investedAmount, inv.currency)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;font-family:var(--font-mono);font-size:13px;">
        <span style="color:var(--text-faint);">Current</span><span>${fmtCur(cur, inv.currency)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--line);font-family:var(--font-mono);font-size:14px;font-weight:600;color:${iover?'var(--emerald)':'var(--coral)'};">
        <span>${iover?'+':''}${fmtCur(ipl, inv.currency)}</span><span>${iover?'+':''}${iplPct}%</span>
      </div>
      <div class="goal-btns">
        <button class="btn" data-action="investment-update-value" data-id="${inv.id}">${I('plus')} Update value</button>
        <button class="btn" data-action="sell-investment" data-id="${inv.id}">${I('arrowUp')} Sell</button>
        <button class="icon-btn" data-action="edit-investment" data-id="${inv.id}">${I('edit')}</button>
        <button class="icon-btn" data-action="delete-investment" data-id="${inv.id}">${I('trash')}</button>
      </div>
    </div>`;
  }).join('') + `</div>`;

  if(closed.length){
    html += `<div class="section-head"><h2>Closed positions</h2></div>`;
    html += `<div class="ledger">` + closed.map(inv=>{
      const ipl = (inv.soldValue||0)-(inv.investedAmount||0);
      const iover = ipl>=0;
      return `<div class="ledger-row">
        <div class="cat-dot" style="background:var(--text-faint)">${I('trend')}</div>
        <div class="ledger-mid">
          <div class="desc">${esc(inv.name)}</div>
          <div class="meta">${esc(inv.category)} · ${inv.purchaseDate} → ${inv.soldDate}</div>
        </div>
        <div class="ledger-leader"></div>
        <div class="ledger-amt" style="color:${iover?'var(--emerald)':'var(--coral)'}">${iover?'+':''}${fmtCur(ipl, inv.currency)}</div>
        <div class="ledger-actions">
          <button class="icon-btn" data-action="delete-investment" data-id="${inv.id}">${I('trash')}</button>
        </div>
      </div>`;
    }).join('') + `</div>`;
  }

  const history = investmentHistory();
  html += `<div class="section-head"><h2>Investment transaction history</h2></div>`;
  html += history.length ? `<div class="ledger">` + history.map(h=>{
    const label = h.type==='buy' ? 'Purchased' : h.type==='sell' ? 'Sold' : 'Value update';
    const color = h.type==='sell' ? 'var(--coral)' : h.type==='buy' ? 'var(--emerald)' : 'var(--info)';
    return `<div class="ledger-row">
      <div class="cat-dot" style="background:${color}">${I(h.type==='sell'?'arrowUp':h.type==='buy'?'arrowDown':'trend')}</div>
      <div class="ledger-mid">
        <div class="desc">${esc(h.name)}</div>
        <div class="meta">${label} · ${h.date}</div>
      </div>
      <div class="ledger-leader"></div>
      <div class="ledger-amt" style="color:${color}">${fmtCur(h.amount, h.currency)}</div>
    </div>`;
  }).join('') + `</div>` : `<div class="ledger empty">${I('inbox')}<p>No investment activity yet.</p></div>`;

  document.getElementById('viewRoot').innerHTML = html;
}

function svgBarChart(labels, seriesList, h){
  h = h || 220;
  const w = 100;
  const max = Math.max(1, ...seriesList.flatMap(s=>s.data));
  const padL=2, padB=3, padT=4, padR=2;
  const chartW = w-padL-padR, chartH = 100-padT-padB;
  const groupW = chartW/labels.length;
  const n = seriesList.length;
  const barW = Math.min(5, groupW/(n+1.5));
  let bars='', grid='';
  [0,.25,.5,.75,1].forEach(f=>{
    const y = padT + chartH - f*chartH;
    grid += `<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="var(--line)" stroke-width="0.15"/>`;
  });
  labels.forEach((lab,i)=>{
    const gx = padL + i*groupW + groupW/2;
    const totalW = n*barW + (n-1)*0.6;
    let sx = gx - totalW/2;
    seriesList.forEach(s=>{
      const val = s.data[i];
      const hgt = (val/max)*chartH;
      bars += `<rect x="${sx}" y="${padT+chartH-hgt}" width="${barW}" height="${Math.max(hgt,0.3)}" rx="1" fill="${s.color}"/>`;
      sx += barW+0.6;
    });
  });
  return `<svg viewBox="0 0 ${w} 100" style="width:100%;height:${h}px;" preserveAspectRatio="none">${grid}${bars}</svg>` + chartLabelsRow(labels);
}

function svgLineChart(labels, series, color, h){
  h = h || 140;
  const w = 100;
  const max = Math.max(...series, 0), min = Math.min(...series, 0);
  const range = (max-min) || 1;
  const padL=3, padR=3, padT=8, padB=4;
  const chartW = w-padL-padR, chartH = 100-padT-padB;
  const stepX = chartW/Math.max(1,labels.length-1);
  let points = series.map((v,i)=>{
    const x = padL + i*stepX;
    const y = padT + chartH - ((v-min)/range)*chartH;
    return [x,y];
  });
  const zeroY = padT + chartH - ((0-min)/range)*chartH;
  const path = points.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');
  const areaPath = path + ` L${points[points.length-1][0].toFixed(2)},${(padT+chartH).toFixed(2)} L${points[0][0].toFixed(2)},${(padT+chartH).toFixed(2)} Z`;
  const dots = points.map((p,i)=>`<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="1.1" fill="${color}"/>`).join('');
  return `<svg viewBox="0 0 ${w} 100" style="width:100%;height:${h}px;" preserveAspectRatio="none">
    <line x1="${padL}" y1="${zeroY.toFixed(2)}" x2="${w-padR}" y2="${zeroY.toFixed(2)}" stroke="var(--line)" stroke-width="0.2" stroke-dasharray="1,1"/>
    <path d="${areaPath}" fill="${color}" opacity="0.08" stroke="none"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="0.7" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>` + chartLabelsRow(labels);
}

function svgMultiLineChart(labels, lines, h){
  h = h || 160;
  const w = 100;
  const allVals = lines.flatMap(l=>l.data.filter(v=>v!=null));
  if(!allVals.length) return `<div class="empty">${I('inbox')}<p>Nothing to plot yet.</p></div>`;
  const max = Math.max(...allVals, 0), min = Math.min(...allVals, 0);
  const range = (max-min) || 1;
  const padL=3, padR=3, padT=8, padB=4;
  const chartW = w-padL-padR, chartH = 100-padT-padB;
  const stepX = chartW/Math.max(1,labels.length-1);
  const zeroY = padT + chartH - ((0-min)/range)*chartH;
  let svg = `<svg viewBox="0 0 ${w} 100" style="width:100%;height:${h}px;" preserveAspectRatio="none">
    <line x1="${padL}" y1="${zeroY.toFixed(2)}" x2="${w-padR}" y2="${zeroY.toFixed(2)}" stroke="var(--line)" stroke-width="0.2" stroke-dasharray="1,1"/>`;
  lines.forEach(line=>{
    let path = ''; let drawing = false;
    line.data.forEach((v,i)=>{
      if(v==null){ drawing = false; return; }
      const x = padL + i*stepX;
      const y = padT + chartH - ((v-min)/range)*chartH;
      path += (drawing?'L':'M') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
      drawing = true;
    });
    if(path.trim()) svg += `<path d="${path.trim()}" fill="none" stroke="${line.color}" stroke-width="0.7" stroke-linejoin="round" stroke-linecap="round"/>`;
  });
  svg += `</svg>`;
  return svg + chartLabelsRow(labels);
}

function svgDonut(entries, h){
  h = h || 200;
  const total = entries.reduce((s,e)=>s+e.value,0) || 1;
  const r = 34, cx=44, cy=44, sw=14;
  let angle = -90;
  const c = 2*Math.PI*r;
  let arcs = '';
  entries.forEach(e=>{
    const frac = e.value/total;
    const dash = frac*c;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${e.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-((angle+90)/360)*c}" transform="rotate(-90 ${cx} ${cy})"/>`;
    angle += frac*360;
  });
  return `<svg viewBox="0 0 88 88" style="width:${h}px;height:${h}px;max-width:100%;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--canvas)" stroke-width="${sw}"/>
    ${arcs}
  </svg>`;
}

function renderTopCategories(spend){
  const rows = Object.entries(spend).sort((a,b)=>b[1]-a[1]).slice(0,6);

  return `<div class="ledger">` + rows.map(([c,v])=>`

/* ============ MODALS ============ */
function openModal(html){
  document.getElementById('modalRoot').innerHTML = `<div class="overlay" id="overlay">${html}</div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function txModal(existing, overrides){
  const isEdit = !!(existing && existing.id);
  let t = existing ? Object.assign({}, existing) : Object.assign({
    type:'expense', amount:'', category: categoryList().find(c=>catMeta(c).type==='expense'),
    date:new Date().toISOString().slice(0,10), note:'', accountId: state.accounts[0]?.id,
    fromAccountId: state.accounts[0]?.id, toAccountId: (state.accounts[1]||state.accounts[0])?.id,
    goalId: state.goals[0]?.id || null, direction:'in', recurring:false
  }, overrides||{});
  renderTxModal(t, isEdit);
}

function readTxDraft(fallback){
  return {
    amount: document.getElementById('fAmount')?.value ?? fallback.amount,
    date: document.getElementById('fDate')?.value || fallback.date,
    note: document.getElementById('fNote')?.value ?? fallback.note,
    category: document.getElementById('fCategory')?.value || fallback.category,
    subcategory: document.getElementById('fSubcategory')?.value || '',
    nature: document.querySelector('#natureSeg button.active')?.dataset.nature || fallback.nature || '',
    accountId: document.getElementById('fAccount')?.value || fallback.accountId,
    fromAccountId: document.getElementById('fFrom')?.value || fallback.fromAccountId,
    toAccountId: document.getElementById('fTo')?.value || fallback.toAccountId,
    goalId: document.getElementById('fGoal')?.value || fallback.goalId,
    direction: fallback.direction || 'in',
    recurring: document.getElementById('fRecurring')?.checked ?? fallback.recurring,
    type: fallback.type,
  };
}

function renderTxModal(t, isEdit){
  const cats = categoryList().filter(c=>catMeta(c).type===t.type);
  const typeBtns = ['income','expense','transfer','saving'];

  let fieldsHtml = '';
  if(t.type==='income' || t.type==='expense'){
    const curSubs = (catMeta(t.category).subs || []);
    fieldsHtml = `
      <div class="field"><label>Category</label>
        <select id="fCategory">${cats.map(c=>`<option value="${esc(c)}" ${t.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select>
      </div>
      ${curSubs.length ? `
      <div class="field"><label>Subcategory (optional)</label>
        <select id="fSubcategory">
          <option value="">No subcategory</option>
          ${curSubs.map(s=>`<option value="${esc(s)}" ${t.subcategory===s?'selected':''}>${esc(s)}</option>`).join('')}
        </select>
      </div>` : ''}
      ${t.type==='expense' ? `
      <div class="field"><label>Nature of spending (optional)</label>
        <div class="seg" id="natureSeg">
          <button type="button" class="${t.nature==='must'?'active out':''}" data-nature="must">Must</button>
          <button type="button" class="${t.nature==='need'?'active out':''}" data-nature="need">Need</button>
          <button type="button" class="${t.nature==='want'?'active out':''}" data-nature="want">Want</button>
        </div>
      </div>` : ''}
      <div class="field"><label>Wallet</label>
        <select id="fAccount">${state.accounts.map(a=>`<option value="${a.id}" ${t.accountId===a.id?'selected':''}>${esc(a.name)} · ${ACCOUNT_GROUPS[a.group||'other'].label}</option>`).join('')}</select>
      </div>`;
  } else if(t.type==='transfer'){
    fieldsHtml = `
      <div class="row2">
        <div class="field"><label>From wallet</label>
          <select id="fFrom">${state.accounts.map(a=>`<option value="${a.id}" ${t.fromAccountId===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>To wallet</label>
          <select id="fTo">${state.accounts.map(a=>`<option value="${a.id}" ${t.toAccountId===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="section-note">Moves money between your own wallets — doesn't count as income or expense.</div>`;
  } else if(t.type==='saving'){
    if(!state.goals.length){
      fieldsHtml = `<div class="empty" style="padding:20px;">${I('goals')}<p>Create a savings goal first, from the Goals tab.</p></div>`;
    }else{
      fieldsHtml = `
        <div class="seg" id="dirSeg">
          <button type="button" class="${t.direction==='in'?'active in':''}" data-dir="in">Contribute</button>
          <button type="button" class="${t.direction==='out'?'active out':''}" data-dir="out">Withdraw</button>
        </div>
        <div class="field"><label>Goal</label>
          <select id="fGoal">${state.goals.map(g=>`<option value="${g.id}" ${t.goalId===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>${t.direction==='out'?'Deposit back to wallet':'From wallet'}</label>
          <select id="fAccount">${state.accounts.map(a=>`<option value="${a.id}" ${t.accountId===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select>
        </div>`;
    }
  }

  const relevantTemplates = (t.type==='income'||t.type==='expense') ? state.txTemplates.filter(tp=>tp.type===t.type) : [];

  openModal(`
    <div class="modal">
      <div class="modal-head"><h3>${isEdit?'Edit transaction':'Add transaction'}</h3><button class="icon-btn" data-action="close-modal">${I('x')}</button></div>
      <div class="modal-body">
        <div class="seg-4" id="typeSeg">
          ${typeBtns.map(ty=>`<button type="button" data-type="${ty}" class="${t.type===ty?'active':''}" style="${t.type===ty?'background:'+TX_TYPE_META[ty].color+';':''}">${TX_TYPE_META[ty].label}</button>`).join('')}
        </div>
        ${relevantTemplates.length ? `
        <div class="field"><label>Quick templates</label>
          <div class="chip-grid" id="templateChipRow">
            ${relevantTemplates.map(tp=>`<span class="chip" style="cursor:pointer;" data-action="apply-template" data-id="${tp.id}"><span class="dot" style="background:${catColor(tp.category)}"></span>${esc(tp.name)}<button type="button" data-action="delete-template" data-id="${tp.id}" title="Remove template">${I('x')}</button></span>`).join('')}
          </div>
        </div>` : ''}
        <div class="row2">
          <div class="field"><label>Amount</label><input type="number" id="fAmount" min="0" step="0.01" value="${t.amount}" placeholder="0.00"></div>
          <div class="field"><label>Date</label><input type="date" id="fDate" value="${t.date}"></div>
        </div>
        <div id="dynamicFields">${fieldsHtml}</div>
        <div class="field"><label>Note (optional)</label><input type="text" id="fNote" value="${esc(t.note||'')}" placeholder="e.g. Lunch with team"></div>
        <label class="checkline"><input type="checkbox" id="fRecurring" ${t.recurring?'checked':''}> ${I('repeat')} Repeats monthly</label>
        ${(t.type==='income'||t.type==='expense') ? `<label class="checkline"><input type="checkbox" id="fSaveTemplate"> Save as quick template</label>` : ''}
      </div>
      <div class="modal-foot">
        ${isEdit?`<button class="btn btn-danger-ghost" data-action="delete-tx" data-id="${t.id}">Delete</button>`:''}
        <button class="btn" data-action="close-modal">Cancel</button>
        <button class="btn btn-primary" data-action="save-tx" data-id="${isEdit?t.id:''}">Save</button>
      </div>
    </div>`);

  document.getElementById('typeSeg').addEventListener('click', e=>{
    const btn = e.target.closest('button[data-type]'); if(!btn) return;
    const draft = readTxDraft(t);
    draft.type = btn.dataset.type;
    if(draft.type==='expense' || draft.type==='income'){
      draft.category = categoryList().find(c=>catMeta(c).type===draft.type);
      draft.subcategory = '';
    }
    txModal(isEdit ? Object.assign({id:t.id}, draft) : draft);
  });
  const catSelect = document.getElementById('fCategory');
  if(catSelect){
    catSelect.addEventListener('change', ()=>{
      const draft = readTxDraft(t);
      draft.category = catSelect.value;
      draft.subcategory = '';
      txModal(isEdit ? Object.assign({id:t.id}, draft) : draft);
    });
  }
  const natureSeg = document.getElementById('natureSeg');
  if(natureSeg){
    natureSeg.addEventListener('click', e=>{
      const btn = e.target.closest('button[data-nature]'); if(!btn) return;
      natureSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active','out'));
      btn.classList.add('active','out');
    });
  }
  const dirSeg = document.getElementById('dirSeg');
  if(dirSeg){
    dirSeg.addEventListener('click', e=>{
      const btn = e.target.closest('button[data-dir]'); if(!btn) return;
      const draft = readTxDraft(t);
      draft.type='saving';
      draft.direction = btn.dataset.dir;
      txModal(isEdit ? Object.assign({id:t.id}, draft) : draft);
    });
  }
}

/* ============ HOUSEHOLD SYNC (FIREBASE) ============ */
let firebaseReady = false;
let db = null;
let unsubHousehold = null, unsubTx = null;

function categoryList(){ return Object.keys(state.categoryMeta||{}); }

function arrToMap(arr){
  const m = {};
  (arr||[]).forEach(o=>{ const c = Object.assign({}, o); const id = c.id; delete c.id; m[id] = c; });
  return m;
}
function mapToArr(m){
  return Object.entries(m||{}).map(([id, rest])=>Object.assign({id}, rest));
}

function householdActive(){ return !!(state.householdId && firebaseReady && db); }
function hhDoc(){ return db.collection('households').doc(state.householdId); }
function hhCol(name){ return hhDoc().collection(name); }

async function initFirebase(cfg){
  try{
    if(!window.firebase){ toast('Firebase library failed to load'); return false; }
    if(!firebase.apps || !firebase.apps.length){ firebase.initializeApp(cfg); }
    db = firebase.firestore();
    await firebase.auth().signInAnonymously();
    firebaseReady = true;
    return true;
  }catch(e){
    console.error(e);
    toast('Could not connect to Firebase — check your config');
    return false;
  }
}

function genHouseholdCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<8;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

async function createHousehold(){
  const code = genHouseholdCode();
  const doc = {
    currency: state.currency,
    accounts: arrToMap(state.accounts),
    categoryMeta: state.categoryMeta,
    budgets: state.budgets,
    goals: arrToMap(state.goals),
    investments: arrToMap(state.investments),
    debts: arrToMap(state.debts),
    plannedPayments: arrToMap(state.plannedPayments),
    txTemplates: arrToMap(state.txTemplates),
    currencyRates: state.currencyRates,
    createdAt: Date.now(),
  };
  try{
    await db.collection('households').doc(code).set(doc);
    if(state.transactions.length){
      const batch = db.batch();
      state.transactions.forEach(t=>{
        const rest = Object.assign({}, t); delete rest.id;
        batch.set(db.collection('households').doc(code).collection('transactions').doc(t.id), rest);
      });
      await batch.commit();
    }
    state.householdId = code;
    await persist();
    startHouseholdListeners();
    renderAll();
    toast('Household created — share code '+code+' with your family');
  }catch(e){
    console.error(e);
    toast('Could not create household — check your Firestore rules');
  }
}

async function joinHousehold(code){
  code = code.trim().toUpperCase();
  try{
    const snap = await db.collection('households').doc(code).get();
    if(!snap.exists){ toast('No household found with that code'); return; }
    state.householdId = code;
    await persist();
    startHouseholdListeners();
    toast('Joined household '+code);
  }catch(e){
    console.error(e);
    toast('Could not join — check the code and your connection');
  }
}

function startHouseholdListeners(){
  stopHouseholdListeners();
  let firstSnap = true;
  unsubHousehold = hhDoc().onSnapshot(snap=>{
    if(!snap.exists) return;
    const d = snap.data();
    state.currency = d.currency ?? state.currency;
    state.accounts = mapToArr(d.accounts);
    state.categoryMeta = d.categoryMeta || {};
    state.budgets = d.budgets || {};
    state.goals = mapToArr(d.goals);
    state.investments = mapToArr(d.investments);
    state.debts = mapToArr(d.debts);
    state.plannedPayments = mapToArr(d.plannedPayments);
    state.txTemplates = mapToArr(d.txTemplates);
    state.currencyRates = d.currencyRates || state.currencyRates;
    renderAll();
    if(firstSnap){ firstSnap = false; ensureCategoryV2Seed().then(ensureCategoryIconsSeed); }
  });
  unsubTx = hhCol('transactions').onSnapshot(snap=>{
    state.transactions = snap.docs.map(doc=>Object.assign({id:doc.id}, doc.data()));
    renderAll();
  });
}
function stopHouseholdListeners(){
  if(unsubHousehold) unsubHousehold();
  if(unsubTx) unsubTx();
  unsubHousehold = null; unsubTx = null;
}

/* ---- CRUD, local-first with household write-through ---- */
async function txUpsert(payload, id){
  if(householdActive()){
    if(id){ await hhCol('transactions').doc(id).set(payload); }
    else{ await hhCol('transactions').add(Object.assign({createdAt:Date.now()}, payload)); }
  }else{
    if(id){
      const idx = state.transactions.findIndex(x=>x.id===id);
      const old = state.transactions[idx];
      state.transactions[idx] = Object.assign({id, createdAt: old ? old.createdAt : Date.now()}, payload);
    }else{
      state.transactions.push(Object.assign({id:uid(), createdAt:Date.now()}, payload));
    }
    await persist();
  }
}
async function txRemove(id){
  if(householdActive()){ await hhCol('transactions').doc(id).delete(); }
  else{ state.transactions = state.transactions.filter(x=>x.id!==id); await persist(); }
}

}

async function debtClose(id, closeDate, toAccountId){
  const d = state.debts.find(x=>x.id===id);
  if(!d) return;
  // Settling a debt moves money: if we borrowed, repaying it is an expense from our wallet;
  // if we lent, being repaid is income into our wallet.
  const catName = d.type==='borrowed' ? 'Debt Repayment' : 'Debt Collected';
  if(!categoryList().includes(catName)){
    await categoryUpsert(catName, {type: d.type==='borrowed'?'expense':'income', color:'#AD1457', subs:[]});
  }
  await txUpsert({
    type: d.type==='borrowed' ? 'expense' : 'income',
    amount: d.amount, category: catName, date: closeDate, note: (d.type==='borrowed'?'Repaid: ':'Collected: ')+d.person,
    accountId: toAccountId, recurring:false
  }, null);
  await debtUpsert({status:'closed', closedDate: closeDate}, id);
}

async function plannedPaymentMarkPaid(id, paidDate, accountId){
  const p = state.plannedPayments.find(x=>x.id===id);
  if(!p) return;
  await txUpsert({type:'expense', amount:p.amount, category:p.category||'Other Expense', date:paidDate, note:'Planned: '+p.name, accountId, recurring:false}, null);
  await plannedPaymentUpsert({lastPaidDate: paidDate}, id);
  if(!p.recurring){
    await plannedPaymentUpsert({done:true}, id);
  }else{
    // push due date forward by one cycle
    const cur = new Date(p.dueDate+'T00:00:00');
    if(p.recurring==='monthly') cur.setMonth(cur.getMonth()+1);
    else if(p.recurring==='weekly') cur.setDate(cur.getDate()+7);
    else if(p.recurring==='yearly') cur.setFullYear(cur.getFullYear()+1);
    await plannedPaymentUpsert({dueDate: cur.toISOString().slice(0,10)}, id);
  }
}
function upcomingPlannedPayments(days){
  const today = todayStr();
  const until = addDays(today, days||30);
  return state.plannedPayments.filter(p=>!p.done && p.dueDate>=today && p.dueDate<=until).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
}
async function investmentAddValueLog(id, date, value){
  const inv = state.investments.find(x=>x.id===id);
  if(!inv) return;
  const log = (inv.valueLog||[]).slice().filter(v=>v.date!==date);
  log.push({date, value});
  log.sort((a,b)=>a.date.localeCompare(b.date));
  await investmentUpsert(Object.assign({}, inv, {valueLog: log}), id);
}
function investmentCurrentValue(inv){
  if(inv.valueLog && inv.valueLog.length) return inv.valueLog[inv.valueLog.length-1].value;
  return inv.investedAmount;
}
function investmentValueAsOf(inv, dateStr){
  if(dateStr < inv.purchaseDate) return 0;
  let val = inv.investedAmount;
  (inv.valueLog||[]).forEach(v=>{ if(v.date<=dateStr) val = v.value; });
  return val;
}
function portfolioValueAsOf(dateStr){
  return state.investments.reduce((s,inv)=>s+investmentValueAsOf(inv,dateStr),0);
}
function investmentTimelineSeries(){
  const dateSet = new Set();
  state.investments.forEach(inv=>{
    dateSet.add(inv.purchaseDate);
    (inv.valueLog||[]).forEach(v=>dateSet.add(v.date));
  });
  dateSet.add(todayStr());
  let dates = Array.from(dateSet).sort();
  if(dates.length>20) dates = dates.slice(dates.length-20);
  return { labels: dates.map(fmtShortDate), series: dates.map(d=>portfolioValueAsOf(d)) };
}

const INVESTMENT_LINE_COLORS = ['#01AA71','#039BE5','#EC407A','#FB8C00','#AD1457','#00ACC1','#7CB342','#8E24AA'];
function investmentPerLineSeries(){
  const dateSet = new Set();
  state.investments.forEach(inv=>{
    dateSet.add(inv.purchaseDate);
    (inv.valueLog||[]).forEach(v=>dateSet.add(v.date));
    if(inv.soldDate) dateSet.add(inv.soldDate);
  });
  dateSet.add(todayStr());
  let dates = Array.from(dateSet).sort();
  if(dates.length>20) dates = dates.slice(dates.length-20);
  const labels = dates.map(fmtShortDate);
  const lines = state.investments.map((inv,i)=>({
    name: inv.name,
    color: INVESTMENT_LINE_COLORS[i % INVESTMENT_LINE_COLORS.length],
    data: dates.map(d=>{
      if(d < inv.purchaseDate) return null;
      if(inv.soldDate && d > inv.soldDate) return null;
      return investmentValueAsOf(inv, d);
    })
  }));
  return {labels, lines};
}

async function investmentSell(id, sellDate, sellValue, toAccountId){
  const inv = state.investments.find(x=>x.id===id);
  if(!inv) return;
  const catName = 'Investment Sale';
  if(!categoryList().includes(catName)){
    await categoryUpsert(catName, {type:'income', color:'#039BE5', subs:[]});
  }
  await investmentAddValueLog(id, sellDate, sellValue);
  await investmentUpsert({soldDate:sellDate, soldValue:sellValue, soldToAccountId:toAccountId}, id);
  await txUpsert({type:'income', amount:sellValue, category:catName, date:sellDate, note:'Sold: '+inv.name, accountId:toAccountId, recurring:false}, null);
}

async function categoryRemove(name){
  if(householdActive()){ await hhDoc().update(new firebase.firestore.FieldPath('categoryMeta', name), firebase.firestore.FieldValue.delete()); }
  else{ delete state.categoryMeta[name]; delete state.budgets[name]; await persist(); }
}
async function categoryRename(oldName, newName, meta){
  if(householdActive()){
    await hhDoc().update(new firebase.firestore.FieldPath('categoryMeta', newName), meta);
    if(newName !== oldName){
      await hhDoc().update(new firebase.firestore.FieldPath('categoryMeta', oldName), firebase.firestore.FieldValue.delete());
      const curBudget = state.budgets[oldName];
      if(curBudget!=null){
        await hhDoc().update(new firebase.firestore.FieldPath('budgets', newName), curBudget);
        await hhDoc().update(new firebase.firestore.FieldPath('budgets', oldName), firebase.firestore.FieldValue.delete());
      }
      const affected = state.transactions.filter(t=>t.category===oldName);
      if(affected.length){
        const batch = db.batch();
        affected.forEach(t=> batch.update(hhCol('transactions').doc(t.id), {category:newName}));
        await batch.commit();
      }
    }
  }else{
    delete state.categoryMeta[oldName];
    state.categoryMeta[newName] = meta;
    if(newName !== oldName){
      state.transactions.forEach(t=>{ if(t.category===oldName) t.category=newName; });
      if(state.budgets[oldName]!=null){ state.budgets[newName]=state.budgets[oldName]; delete state.budgets[oldName]; }
    }
    await persist();
  }
}
